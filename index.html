<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercato Premium - Shop Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="database.js"></script>
    <style>
        :root { 
            --primary: #1E293B; --primary-light: #334155; --secondary: #10B981; 
            --secondary-hover: #059669; --accent: #F59E0B; --bg: #F8FAFC; 
            --text: #0F172A; --text-muted: #64748B; --card-bg: #FFFFFF; --border: #E2E8F0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1); --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 100; }
        .navbar h2 { font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .navbar a { color: white; text-decoration: none; font-weight: 600; background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.9rem; }
        .navbar a:hover { background: rgba(255,255,255,0.25); }
        .container { display: flex; padding: 30px 40px; gap: 30px; max-width: 1600px; margin: 0 auto; width: 100%; align-items: flex-start; }
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 12px; position: sticky; top: 90px; }
        .category-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; text-align: left; cursor: pointer; border-radius: 12px; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; }
        .category-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: translateX(4px); }
        .category-btn.active { background-color: var(--secondary); color: white; border-color: var(--secondary); }
        .products-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .product-card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); transition: all 0.3s ease; }
        .product-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        .product-icon { font-size: 2.5rem; margin-bottom: 15px; background: var(--bg); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .product-card h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
        .product-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; font-weight: 600;}
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .prezzo { font-weight: 700; color: var(--primary); font-size: 1.4rem; }
        .btn-add { background-color: var(--secondary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s; }
        .btn-add:disabled { background-color: #E2E8F0; color: #94A3B8; cursor: not-allowed; }
        .cart-panel { width: 340px; background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: var(--shadow-lg); height: fit-content; position: sticky; top: 90px; border: 1px solid var(--border); }
        .cart-items-wrapper { max-height: 50vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: var(--bg); border-radius: 10px; }
        .qty-controls { display: flex; align-items: center; background: white; border-radius: 6px; border: 1px solid var(--border); }
        .cart-qty-btn { border: none; padding: 5px 12px; cursor: pointer; background: transparent; font-weight: bold; }
        .totale-carrello { font-size: 1.4rem; font-weight: 700; margin-top: 20px; text-align: right; border-top: 2px dashed var(--border); padding-top: 20px; color: var(--primary); }
        .btn-checkout { background-color: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1.1rem; margin-top: 20px; transition: 0.3s; }
        .btn-checkout:hover { background-color: #D97706; transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>🛍️ SuperStore Premium</h2>
        <a href="login.html">⚙️ Area Manager</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <button class="category-btn active" onclick="filtra('Tutte')">🛒 Tutti i Prodotti</button>
            <button class="category-btn" onclick="filtra('Alimentari')">🍎 Alimentari</button>
            <button class="category-btn" onclick="filtra('Cura della casa')">🧼 Cura della casa</button>
            <button class="category-btn" onclick="filtra('Giardinaggio')">🌱 Giardinaggio</button>
            <button class="category-btn" onclick="filtra('Macchina')">🚗 Macchina</button>
        </div>

        <div class="products-grid" id="prodotti-container"></div>

        <div class="cart-panel">
            <h3>🛒 Il tuo Carrello</h3>
            <div id="customer-status" style="min-height:20px; margin-bottom:10px; color:#0f766e; font-weight:600;"></div>
            <div id="carrello-container" class="cart-items-wrapper"></div>
            <div id="totale-container" class="totale-carrello">Totale: € 0.00</div>
            <button class="btn-checkout" onclick="acquista()">Procedi al Pagamento ➔</button>
        </div>
    </div>

    <script>
        // Database dei prodotti storici di base (con icone coordinate per la veste Premium)
        const datiIniziali = [
            { id: 1, nome: "Latte Intero", cat: "Alimentari", sub: "Da frigo", qty: 45, maxQty: 100, prezzo: 1.20, icona: "🥛" },
            { id: 2, nome: "Piselli Surgelati", cat: "Alimentari", sub: "Da freezer", qty: 20, maxQty: 60, prezzo: 2.50, icona: "🫛" },
            { id: 3, nome: "Biscotti Frollini", cat: "Alimentari", sub: "Biscotti", qty: 60, maxQty: 80, prezzo: 1.80, icona: "🍪" },
            { id: 4, nome: "Acqua Naturale 1.5L", cat: "Alimentari", sub: "Bevande", qty: 120, maxQty: 200, prezzo: 0.50, icona: "💧" },
            { id: 5, nome: "Detersivo Piatti", cat: "Cura della casa", sub: "Cucina", qty: 30, maxQty: 50, prezzo: 1.90, icona: "🧼" },
            { id: 6, nome: "Scopa", cat: "Cura della casa", sub: "Casa", qty: 5, maxQty: 30, prezzo: 5.00, icona: "🧹" },
            { id: 7, nome: "Ammorbidente", cat: "Cura della casa", sub: "Bucato", qty: 25, maxQty: 50, prezzo: 3.20, icona: "🧴" },
            { id: 8, nome: "Pianta di Ficus", cat: "Giardinaggio", sub: "Piante", qty: 10, maxQty: 20, prezzo: 15.00, icona: "🪴" },
            { id: 9, nome: "Semi di Pomodoro", cat: "Giardinaggio", sub: "Semi", qty: 50, maxQty: 100, prezzo: 1.00, icona: "🍅" },
            { id: 10, nome: "Tubo Irrigazione", cat: "Giardinaggio", sub: "Irrigazione", qty: 8, maxQty: 50, prezzo: 25.00, icona: "🚰" },
            { id: 11, nome: "Rastrello", cat: "Giardinaggio", sub: "Cura del giardino", qty: 12, maxQty: 25, prezzo: 12.00, icona: "🍂" },
            { id: 12, nome: "Liquido Tergicristalli", cat: "Macchina", sub: "Pulizia", qty: 15, maxQty: 100, prezzo: 4.50, icona: "🧪" },
            { id: 13, nome: "Olio Motore 5W-30", cat: "Macchina", sub: "Manutenzione", qty: 18, maxQty: 40, prezzo: 9.90, icona: "🛢️" }
        ];

        // Caricamento controllato dell'inventario
        let inventario = loadInventario();

        let carrello = [];
        let catAttuale = 'Tutte';

        function renderingProdotti() {
            const container = document.getElementById('prodotti-container');
            container.innerHTML = '';
            const filtrati = catAttuale === 'Tutte' ? inventario : inventario.filter(p => p.cat === catAttuale);
            filtrati.forEach((p, index) => {
                const esaurito = p.qty <= 0;
                container.innerHTML += `
                    <div class="product-card fade-in">
                        <div class="product-icon">${p.icona || '📦'}</div>
                        <h3>${p.nome}</h3>
                        <p class="product-sub">${p.sub}</p>
                        <div class="price-row">
                            <span class="prezzo">€ ${p.prezzo.toFixed(2)}</span>
                            <span style="font-size:0.7rem; font-weight:bold; color:${esaurito?'red':'green'}">${esaurito?'ESAURITO':'DISPONIBILE'}</span>
                        </div>
                        <button class="btn-add" ${esaurito ? 'disabled' : ''} onclick="aggiungiAlCarrello(${p.id})">Aggiungi</button>
                    </div>
                `;
            });
        }

        function filtra(cat) { 
            catAttuale = cat; 
            // Aggiorna graficamente lo stato del pulsante attivo nella sidebar
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderingProdotti(); 
        }
        
        function aggiungiAlCarrello(id) {
            const p = inventario.find(i => i.id === id);
            if (!p) return showCustomerMessage('Prodotto non trovato', 'error');
            const item = carrello.find(c => c.id === id);
            if (item) {
                if (item.qty < p.qty) {
                    item.qty++;
                } else {
                    return showCustomerMessage('Quantità massima raggiunta per questo prodotto', 'error');
                }
            } else {
                if (p.qty <= 0) return showCustomerMessage('Prodotto esaurito', 'error');
                carrello.push({...p, qty: 1});
            }
            renderingCarrello();
            showCustomerMessage('Articolo aggiunto al carrello');
        }

        function renderingCarrello() {
            const container = document.getElementById('carrello-container');
            container.innerHTML = carrello.map(c => `
                <div class="cart-item">
                    <span>${c.nome} (x${c.qty})</span>
                    <span>€ ${(c.prezzo * c.qty).toFixed(2)}</span>
                </div>
            `).join('');
            document.getElementById('totale-container').innerText = `Totale: € ${calcolaTotale().toFixed(2)}`;
        }

        function calcolaTotale() { return carrello.reduce((tot, item) => tot + (item.qty * item.prezzo), 0); }

        function acquista() {
            if (carrello.length === 0) return showCustomerMessage('Il carrello è vuoto', 'error');
            localStorage.setItem('carrelloCheckout', JSON.stringify(carrello));
            const totale = calcolaTotale().toFixed(2);
            localStorage.setItem('totaleCheckout', totale);
            localStorage.setItem('ultimoTotale', totale);
            window.location.href = "checkout.html";
        }

        function showCustomerMessage(text, type = 'info') {
            const el = document.getElementById('customer-status');
            if (!el) return;
            el.style.color = type === 'error' ? '#b91c1c' : '#0f766e';
            el.innerText = text;
            clearTimeout(window.customerMessageTimeout);
            window.customerMessageTimeout = setTimeout(() => { el.innerText = ''; }, 3500);
        }

        renderingProdotti();
    </script>
</body>
</html>
