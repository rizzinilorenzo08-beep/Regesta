<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SinGo - Shop Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <style>
        :root { 
            --primary: #1E293B; --primary-light: #334155; --secondary: #10B981; 
            --secondary-hover: #059669; --accent: #F59E0B; --bg: #F8FAFC; 
            --text: #0F172A; --text-muted: #64748B; --card-bg: #FFFFFF; --border: #E2E8F0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1); --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        .promo-banner { background: linear-gradient(135deg, #16a34a, #10b981); color: white; padding: 16px 24px; border-radius: 16px; margin: 20px auto 0; width: calc(100% - 80px); max-width: 1200px; display: flex; justify-content: space-between; align-items: center; gap: 20px; box-shadow: 0 15px 35px rgba(16, 185, 129, 0.18); }
        .promo-banner p { margin: 0; font-weight: 600; }
        .promo-badge { background: rgba(255,255,255,.18); padding: 8px 14px; border-radius: 999px; font-size: 0.95rem; }
        .promo-banner.hidden { display: none; }
        .promo-banner.flash { animation: salePulse 1.2s ease; }
        @keyframes salePulse { 0% { box-shadow: 0 0 0 rgba(255,255,255,0); transform: scale(1); }
            20% { box-shadow: 0 0 0 6px rgba(255,255,255,0.15); transform: scale(1.02); }
            60% { box-shadow: 0 0 0 0 rgba(255,255,255,0); transform: scale(1); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); transform: scale(1); }
        }
        .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast-message { display: none; background: rgba(45,55,72,0.95); color: white; padding: 14px 20px; border-radius: 14px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); font-weight: 700; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 100; }
        .navbar h2 { font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .navbar a { color: white; text-decoration: none; font-weight: 600; background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.9rem; }
        .navbar a:hover { background: rgba(255,255,255,0.25); }
        .container { display: flex; padding: 30px 40px; gap: 30px; max-width: 1600px; margin: 0 auto; width: 100%; align-items: flex-start; }
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 12px; position: sticky; top: 90px; }
        .category-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; text-align: left; cursor: pointer; border-radius: 12px; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; }
        .category-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: translateX(4px); }
        .category-btn.active { background-color: var(--secondary); color: white; border-color: var(--secondary); }
        .products-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .product-card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); transition: all 0.3s ease; }
        .product-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        .product-icon { font-size: 2.5rem; margin-bottom: 15px; background: var(--bg); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .product-card h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
        .product-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; font-weight: 600;}
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .prezzo { font-weight: 700; color: var(--primary); font-size: 1.4rem; }
        .btn-add { background-color: var(--secondary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s; }
        .btn-add:disabled { background-color: #E2E8F0; color: #94A3B8; cursor: not-allowed; }
        .cart-panel { width: 340px; background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: var(--shadow-lg); height: fit-content; position: sticky; top: 90px; border: 1px solid var(--border); }
        .cart-items-wrapper { max-height: 50vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: var(--bg); border-radius: 10px; }
        .qty-controls { display: flex; align-items: center; background: white; border-radius: 6px; border: 1px solid var(--border); }
        .cart-qty-btn { border: none; padding: 5px 12px; cursor: pointer; background: transparent; font-weight: bold; }
        .totale-carrello { font-size: 1.4rem; font-weight: 700; margin-top: 20px; text-align: right; border-top: 2px dashed var(--border); padding-top: 20px; color: var(--primary); }
        .btn-checkout { background-color: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1.1rem; margin-top: 20px; transition: 0.3s; }
        .btn-checkout:hover { background-color: #D97706; transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .search-bar { background: white; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 99; }
        .search-bar .wrapper { max-width: 1600px; margin: 0 auto; position: relative; }
        .search-bar input { width: 100%; max-width: 400px; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95rem; transition: all 0.3s ease; }
        .search-bar input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .search-results { position: absolute; top: 45px; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 10px; max-height: 300px; overflow-y: auto; box-shadow: var(--shadow-lg); display: none; z-index: 1000; max-width: 400px; }
        .search-item { padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 10px; }
        .search-item:hover { background: var(--bg); }
        .search-item .icon { font-size: 1.5rem; }
        .search-item .name { font-weight: 600; color: var(--primary); }
        .search-item .sub { font-size: 0.85rem; color: var(--text-muted); }
        .search-item .price { font-weight: 700; color: var(--secondary); margin-left: auto; }
        .user-section { display: flex; align-items: center; gap: 12px; }
        .user-greeting { display: none; color: white; font-weight: 600; }
        .btn-logout { display: none; background: rgba(255,255,255,0.15); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,255,255,0.25); }
        .points-link { display: none; background: rgba(255,193,7,0.9); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .points-link:hover { background: rgba(255,193,7,1); transform: translateY(-2px); }
        .register-link, .login-link { color: white; text-decoration: none; font-weight: 600; background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.9rem; }
        .register-link:hover, .login-link:hover { background: rgba(255,255,255,0.25); }
        .not-registered-alert { background: #fef3c7; border: 2px solid #fcd34d; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: none; }
        .not-registered-alert .title { color: #92400e; font-weight: 600; margin-bottom: 8px; }
        .not-registered-alert p { color: #78350f; font-size: 0.9rem; margin-bottom: 10px; }
        .not-registered-alert .actions { display: flex; gap: 8px; }
        .not-registered-alert .actions a { flex: 1; text-align: center; padding: 8px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .not-registered-alert .actions .register { background: #f59e0b; color: white; }
        .not-registered-alert .actions .login { background: #2c3e50; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>🛍️ SinGo</h2>
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="user-section">
                <span class="user-greeting" id="userGreeting"></span>
                <a class="points-link" id="puntiLink" href="points.html">⭐ I Miei Punti</a>
                <button class="btn-logout" id="logoutBtn" onclick="logoutUser()">Logout</button>
                <a class="register-link" id="registerLink" href="register.html" style="display:none;">📝 Registrati</a>
                <a class="login-link" id="loginLink" href="login-cliente.html" style="display:none;">🔓 Login</a>
            </div>
            <a href="sconti.html">🔥 Offerte</a>
            <a href="login.html">⚙️ Area Manager</a>
        </div>
    </div>

    <div id="promo-banner" class="promo-banner hidden">
        <div>
            <p id="promo-title"></p>
            <p id="promo-message"></p>
        </div>
        <div class="promo-badge" id="promo-timer"></div>
    </div>

    <div class="search-bar">
        <div class="wrapper">
            <input type="text" id="searchInput" placeholder="🔍 Cerca prodotti per nome...">
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <button class="category-btn active" onclick="filtra('Tutte', this)">🛒 Tutti i Prodotti</button>
            <button class="category-btn" onclick="filtra('Alimentari', this)">🍎 Alimentari</button>
            <button class="category-btn" onclick="filtra('Cura della casa', this)">🧼 Cura della casa</button>
            <button class="category-btn" onclick="filtra('Giardinaggio', this)">🌱 Giardinaggio</button>
            <button class="category-btn" onclick="filtra('Macchina', this)">🚗 Macchina</button>
        </div>

        <div class="products-grid" id="prodotti-container"></div>

        <div class="cart-panel">
            <h3>🛒 Il tuo Carrello</h3>
            
            <div class="not-registered-alert" id="notRegisteredAlert">
                <div class="title">📢 Guadagna Punti!</div>
                <p>Registrati e ricevi 1 punto spesa ogni 15€ acquistati. Usa i tuoi punti per ottenere sconti!</p>
                <div class="actions">
                    <a href="register.html" class="register">Registrati</a>
                    <a href="login-cliente.html" class="login">Accedi</a>
                </div>
            </div>

            <div id="carrello-container" class="cart-items-wrapper"></div>
            <div id="totale-container" class="totale-carrello">Totale: € 0.00</div>
            <button class="btn-checkout" onclick="acquista()">Procedi al Pagamento ➔</button>
        </div>
    </div>

    <div class="toast-container"><div id="index-toast" class="toast-message"></div></div>

    <script>
        let inventario = [];
        let carrello = [];
        let catAttuale = 'Tutte';
        let saleTimer = null;
        let saleActivePrev = false;

        // ── Inizializzazione ─────────────────────────────────────────────
        async function initializePage() {
            ensureDatabase();
            await ensureSaleSchedule();
            inventario = await loadInventario();
            // Assicura che tutti i prodotti abbiano un'icona
            inventario = inventario.map(p => ({ ...p, icona: p.icona || '📦' }));
            renderPromoBanner();
            renderProducts();
            renderCart();
            setupSearchBar();
            updateUserUI();

            updateSaleTimer();
            clearInterval(saleTimer);
            saleTimer = setInterval(updateSaleTimer, 1000);
        }

        // ── Promo Banner ─────────────────────────────────────────────────
        function renderPromoBanner() {
            const banner = document.getElementById('promo-banner');
            const title = document.getElementById('promo-title');
            const message = document.getElementById('promo-message');
            const timer = document.getElementById('promo-timer');
            const saleInfo = getSaleInfo();
            const nextSeconds = getNextSaleRemainingSeconds();
            if (!banner || !title || !message || !timer) return;

            if (saleInfo && saleInfo.active) {
                const range = getSaleDiscountRange();
                const rangeText = range && range.min !== range.max
                    ? `${range.min}% - ${range.max}%`
                    : `${range ? range.min : 0}%`;
                banner.classList.remove('hidden');
                title.innerText = saleInfo.title;
                message.innerText = `Sconti del ${rangeText} su prodotti selezionati.`;
                return;
            }

            if (nextSeconds > 0) {
                banner.classList.remove('hidden');
                title.innerText = 'Prossima Offerta';
                message.innerText = 'Presto torna una nuova promozione su 10 prodotti selezionati.';
                return;
            }

            banner.classList.add('hidden');
            timer.innerText = '';
        }

        async function updateSaleTimer() {
            const active = isSaleActive();
            const remaining = active ? getSaleRemainingSeconds() : getNextSaleRemainingSeconds();
            const timer = document.getElementById('promo-timer');
            if (!timer) return;
            if (remaining <= 0) {
                const prevActive = active;
                await ensureSaleSchedule();
                const newActive = isSaleActive();
                renderPromoBanner();
                renderProducts();
                if (!prevActive && newActive) {
                    flashPromoBanner('Nuova offerta attiva!');
                }
                saleActivePrev = newActive;
                return;
            }
            const minutes = String(Math.floor(remaining / 60)).padStart(2, '0');
            const seconds = String(remaining % 60).padStart(2, '0');
            timer.innerText = active ? `Scade tra ${minutes}:${seconds}` : `Prossima offerta tra ${minutes}:${seconds}`;
            if (!saleActivePrev && active) {
                flashPromoBanner('Nuova offerta attiva!');
            }
            saleActivePrev = active;
        }

        function isProductOnSale(item) {
            return isSaleActive() && Array.isArray(getSaleInfo().productIds) && getSaleInfo().productIds.includes(item.id);
        }

        function getPriceHtml(p, esaurito = false) {
            const discount = getSaleDiscountPercent(p);
            if (discount > 0) {
                const discounted = getDiscountedPrice(p.prezzo, p);
                return `
                    <div class="price-row">
                        <span class="prezzo">€ ${discounted.toFixed(2)}</span>
                        <span style="color:#94a3b8;text-decoration:line-through;font-size:0.9rem;">€ ${p.prezzo.toFixed(2)}</span>
                    </div>
                `;
            }
            const badgeHtml = esaurito 
                ? `<span style="font-size:0.75rem; font-weight:bold; color:#dc2626; background:#fee2e2; padding:4px 8px; border-radius:4px;">ESAURITO</span>`
                : `<span style="font-size:0.75rem; font-weight:bold; color:green;">DISPONIBILE</span>`;
            return `
                <div class="price-row">
                    <span class="prezzo">€ ${p.prezzo.toFixed(2)}</span>
                    ${badgeHtml}
                </div>
            `;
        }

        // ── Prodotti ─────────────────────────────────────────────────────
        function renderProducts() {
            ensureDatabase();
            const container = document.getElementById('prodotti-container');
            container.innerHTML = '';
            const filtrati = catAttuale === 'Tutte' ? inventario : inventario.filter(p => p.cat === catAttuale);

            if (filtrati.length === 0) {
                container.innerHTML = `
                    <div style="grid-column:1/-1; padding:30px; text-align:center; color:#475569;">
                        Nessun prodotto disponibile in questa categoria.
                    </div>
                `;
                return;
            }

            container.innerHTML = filtrati.map(p => {
                const esaurito = p.qty <= 0;
                const discount = getSaleDiscountPercent(p);
                const saleBadge = discount > 0 ? `<div style="color:#059669;font-weight:700;margin-bottom:8px;">-${discount}% PROMO</div>` : '';
                return `
                    <div class="product-card fade-in" data-product-id="${p.id}">
                        <div class="product-icon">${p.icona}</div>
                        ${saleBadge}
                        <h3>${p.nome}</h3>
                        <p class="product-sub">${p.sub}</p>
                        ${getPriceHtml(p, esaurito)}
                        <button class="btn-add" ${esaurito ? 'disabled style="background-color: #dc2626; color: white;"' : ''} onclick="aggiungiAlCarrello(${p.id})">${esaurito ? 'Esaurito' : 'Aggiungi'}</button>
                    </div>
                `;
            }).join('');
        }

        function filtra(cat, button) {
            catAttuale = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');
            renderProducts();
        }

        // ── Carrello ─────────────────────────────────────────────────────
        function aggiungiAlCarrello(id) {
            const p = inventario.find(item => item.id === id);
            if (!p) return;
            const item = carrello.find(c => c.id === id);
            if (item) {
                if (item.qty < p.qty) item.qty++;
            } else {
                carrello.push({ ...p, qty: 1 });
            }
            renderCart();
            showIndexToast(`${p.nome} aggiunto al carrello`);
        }

        function renderCart() {
            const container = document.getElementById('carrello-container');
            container.innerHTML = carrello.map(c => {
                const lineTotal = calcItemTotal(c);
                return `
                    <div class="cart-item">
                        <span>${c.nome} (x${c.qty})</span>
                        <span>€ ${lineTotal.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('totale-container').innerText = `Totale: € ${calcolaTotale().toFixed(2)}`;
        }

        function calcolaTotale() {
            return carrello.reduce((tot, item) => tot + calcItemTotal(item), 0);
        }

        function calcItemTotal(item) {
            const prezzoUnitario = isProductOnSale(item) ? getDiscountedPrice(item.prezzo, item) : item.prezzo;
            return prezzoUnitario * item.qty;
        }

        function showIndexToast(message) {
            const toast = document.getElementById('index-toast');
            if (!toast) return;
            toast.innerText = message;
            toast.style.display = 'block';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.style.display = 'none', 3000);
        }

        function flashPromoBanner(message) {
            const banner = document.getElementById('promo-banner');
            if (!banner) return;
            banner.classList.add('flash');
            if (message) showIndexToast(message);
            clearTimeout(banner._flashTimer);
            banner._flashTimer = setTimeout(() => {
                banner.classList.remove('flash');
            }, 1200);
        }

        function acquista() {
            if (carrello.length === 0) {
                showIndexToast("Carrello vuoto!");
                return;
            }
            localStorage.setItem('carrelloCheckout', JSON.stringify(carrello));
            const totale = calcolaTotale().toFixed(2);
            localStorage.setItem('totaleCheckout', totale);
            localStorage.setItem('ultimoTotale', totale);
            window.location.href = "checkout.html";
        }

        // ── Ricerca ─────────────────────────────────────────────────────
        function setupSearchBar() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');

            searchInput.addEventListener('input', function (e) {
                const query = e.target.value.toLowerCase().trim();

                if (query.length === 0) {
                    searchResults.style.display = 'none';
                    return;
                }

                const risultati = inventario.filter(p =>
                    p.nome.toLowerCase().includes(query) ||
                    p.sub.toLowerCase().includes(query)
                );

                if (risultati.length === 0) {
                    searchResults.innerHTML = `
                        <div style="padding: 15px; text-align: center; color: #94a3b8;">
                            Nessun prodotto trovato per "${query}"
                        </div>
                    `;
                    searchResults.style.display = 'block';
                    return;
                }

                searchResults.innerHTML = risultati.slice(0, 8).map(p => `
                    <div class="search-item" onclick="scrollToProduct(${p.id}); document.getElementById('searchInput').value=''; document.getElementById('searchResults').style.display='none';">
                        <span class="icon">${p.icona}</span>
                        <div>
                            <div class="name">${p.nome}</div>
                            <div class="sub">${p.sub}</div>
                        </div>
                        <div class="price">€ ${p.prezzo.toFixed(2)}</div>
                    </div>
                `).join('');
                searchResults.style.display = 'block';
            });

            document.addEventListener('click', function (e) {
                if (!e.target.closest('#searchInput') && !e.target.closest('#searchResults')) {
                    searchResults.style.display = 'none';
                }
            });
        }

        function scrollToProduct(id) {
            const product = inventario.find(p => p.id === id);
            if (!product) return;

            if (catAttuale !== 'Tutte' && catAttuale !== product.cat) {
                filtra(product.cat, document.querySelector(`[onclick*="${product.cat}"]`));
            } else if (catAttuale === 'Tutte') {
                renderProducts();
            }

            setTimeout(() => {
                const productCard = document.querySelector(`.product-card[data-product-id="${id}"]`);
                if (productCard) {
                    productCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    productCard.style.boxShadow = '0 0 0 3px #10B981, 0 10px 25px rgba(0,0,0,0.15)';
                    setTimeout(() => {
                        productCard.style.boxShadow = '';
                    }, 3000);
                }
            }, 100);
        }

        // ── Utente ──────────────────────────────────────────────────────
        function updateUserUI() {
            const cliente = caricaClienteLoggato();
            const userGreeting = document.getElementById('userGreeting');
            const puntiLink = document.getElementById('puntiLink');
            const logoutBtn = document.getElementById('logoutBtn');
            const registerLink = document.getElementById('registerLink');
            const loginLink = document.getElementById('loginLink');
            const notRegisteredAlert = document.getElementById('notRegisteredAlert');

            if (cliente) {
                userGreeting.style.display = 'inline-block';
                userGreeting.textContent = `👤 Ciao ${cliente.nome}!`;
                puntiLink.style.display = 'inline-block';
                logoutBtn.style.display = 'inline-block';
                registerLink.style.display = 'none';
                loginLink.style.display = 'none';
                notRegisteredAlert.style.display = 'none';
            } else {
                userGreeting.style.display = 'none';
                puntiLink.style.display = 'none';
                logoutBtn.style.display = 'none';
                registerLink.style.display = 'inline-block';
                loginLink.style.display = 'inline-block';
                notRegisteredAlert.style.display = 'block';
            }
        }

        function logoutUser() {
            if (confirm('Sei sicuro di voler fare il logout?')) {
                logoutCliente();
                updateUserUI();
                carrello = [];
                renderCart();
                showIndexToast('Logout effettuato');
            }
        }

        // ── Avvio ──────────────────────────────────────────────────────
        initializePage();
    </script>
</body>
</html>
