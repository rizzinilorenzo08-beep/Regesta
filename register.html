<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - SuperStore Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🎉 Iscriviti Ora</h1>
            <p>Entra nel programma fedeltà SuperStore Premium</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div class="benefits">
            <ul>
                <li>1 punto spesa ogni 15€ acquistati</li>
                <li>Accedi a offerte esclusive</li>
                <li>Gestisci i tuoi punti facilmente</li>
            </ul>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Es. Mario Rossi" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tua.email@example.com" required>
                <small>Usa questa email per il login</small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Almeno 6 caratteri" required>
                <small>Scegli una password sicura</small>
            </div>

            <div class="form-group">
                <label for="confermaPassword">Conferma Password</label>
                <input type="password" id="confermaPassword" placeholder="Ripeti la password" required>
            </div>

            <button type="submit" class="btn-register">Registrati</button>
        </form>

        <div class="form-links">
            <p>Hai già un account?</p>
            <a href="login-cliente.html">Accedi al tuo profilo</a>
            <p style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                <a href="index.html">← Torna alla index</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const messageBox = document.getElementById('messageBox');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confermaPassword = document.getElementById('confermaPassword').value;

            if (!nome || !email || !password) {
                mostraMessaggio('Compila tutti i campi', 'error');
                return;
            }

            if (password.length < 6) {
                mostraMessaggio('La password deve essere di almeno 6 caratteri', 'error');
                return;
            }

            if (password !== confermaPassword) {
                mostraMessaggio('Le password non coincidono', 'error');
                return;
            }

            const btn = form.querySelector('.btn-register');
            btn.disabled = true;
            btn.textContent = 'Registrazione in corso...';

            try {
                const result = await DB_CLIENTI.registraCliente(email, password, nome);

                if (result.success) {
                    mostraMessaggio('✓ Registrazione completata! Reindirizzamento...', 'success');
                    salvaClienteLoggato(result.cliente);
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    mostraMessaggio(result.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Registrati';
                }
            } catch (error) {
                console.error('Errore durante la registrazione:', error);
                mostraMessaggio('Errore durante la registrazione. Riprova.', 'error');
                btn.disabled = false;
                btn.textContent = 'Registrati';
            }
        });

        function mostraMessaggio(testo, tipo) {
            messageBox.textContent = testo;
            messageBox.className = `message ${tipo} show`;
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }
    </script>
    <script src="theme.js"></script>
</body>
</html>
