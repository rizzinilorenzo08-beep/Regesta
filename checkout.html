<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Conferma Ordine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="db.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .metodo { margin: 15px 0; padding: 10px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; }
        .metodo:hover { border-color: #27ae60; }
        .metodo.selezionato { border-color: #27ae60; background: #e8f5e9; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-test { background: #3b82f6; margin-top: 10px; }
        .indirizzo-section { background:#f9fafb; padding:15px; border-radius:8px; border:1px solid #d1d5db; margin:15px 0; }
        .indirizzo-section h3 { margin-top:0; color:#1f2937; }
        .indirizzo-section label { display:block; margin:10px 0 4px; color:#374151; font-size:0.95rem; }
        .indirizzo-section input { width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; }
        .indirizzo-section input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .debug-box { background: #f1f5f9; padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-top: 15px; max-height: 150px; overflow-y: auto; font-family: monospace; }
        .debug-box.error { background: #fee2e2; color: #991b1b; }
        .debug-box.success { background: #dcfce7; color: #166534; }
        .debug-box.warning { background: #fef3c7; color: #92400e; }
        .punti-section { display:none; background:#e0f7e0; padding:15px; border-radius:6px; margin:15px 0; border:2px solid #27ae60; }
        .punti-section .title { font-weight:bold; color:#27ae60; margin-bottom:8px; }
        .punti-section .value { font-size:1.1rem; color:#27ae60; }
        .punti-section .sub { font-size:0.85rem; color:#555; margin-top:8px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Seleziona Pagamento</h2>
        <div id="riepilogo"></div>
        
        <div id="puntiSection" class="punti-section">
            <div class="title">⭐ Guadagnerai Punti Spesa!</div>
            <div class="value" id="puntiGuadagnati"></div>
            <div class="sub">Con questi punti potrai acquistare sconti esclusivi!</div>
        </div>
        
        <div class="indirizzo-section">
            <h3>Indirizzo di consegna</h3>
            <label for="indirizzoVia">Via e numero civico</label>
            <input type="text" id="indirizzoVia" placeholder="Es. Via Roma 10" />
            <label for="indirizzoCitta">Città</label>
            <input type="text" id="indirizzoCitta" placeholder="Es. Milano" />
            <label for="indirizzoCap">CAP</label>
            <input type="text" id="indirizzoCap" placeholder="Es. 20100" />
            <label for="indirizzoProvincia">Provincia</label>
            <input type="text" id="indirizzoProvincia" placeholder="Es. MI" />
            <label for="checkoutEmail">Email per lo scontrino</label>
            <input type="email" id="checkoutEmail" placeholder="esempio@cliente.it" />
        </div>
        
        <div class="metodo" data-metodo="PayPal" onclick="salvaMetodo('PayPal', this)">PayPal</div>
        <div class="metodo" data-metodo="Bonifico" onclick="salvaMetodo('Bonifico', this)">Bonifico Bancario</div>
        <div class="metodo" data-metodo="Contanti" onclick="salvaMetodo('Contanti', this)">Contanti alla consegna</div>
        
        <button id="btn-conferma" onclick="confermaOrdine()">Conferma Acquisto</button>
        
        <button class="btn-test" onclick="testConnessione()">🔌 Test Connessione Supabase</button>
        
        <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#777;">Torna indietro</a>
        
        <div id="debug-box" class="debug-box">In attesa di azioni...</div>
        
        <div id="checkout-toast" style="display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(45,55,72,0.95); color:white; padding:14px 20px; border-radius:12px; box-shadow:0 20px 40px rgba(0,0,0,0.2); z-index:1000; font-weight:700;"></div>
    </div>

    <script>
        // ===========================================
        // 1. LOG DI DEBUG INIZIALE E INIZIALIZZAZIONE EMAILJS
        // ===========================================
        console.log('🟢 checkout.html caricato');
        console.log('📦 supabase disponibile?', typeof supabase !== 'undefined');
        console.log('📦 loadInventario disponibile?', typeof loadInventario !== 'undefined');

        (function(){
            emailjs.init({
                publicKey: "nLywcTRnXOOUYsDtW",
            });
        })();

        function debugLog(message, type = 'info') {
            const box = document.getElementById('debug-box');
            if (!box) return;
            const time = new Date().toLocaleTimeString();
            box.innerHTML = `<strong>[${time}]</strong> ${message}<br>` + box.innerHTML;
            box.className = 'debug-box ' + type;
            if (box.children.length > 20) {
                box.lastChild?.remove();
            }
        }

        debugLog('Pagina caricata correttamente e EmailJS configurato');

        // ===========================================
        // 2. VERIFICA CLIENTE REGISTRATO
        // ===========================================
        const cliente = caricaClienteLoggato();
        debugLog('Cliente registrato: ' + (cliente ? 'SÌ (' + cliente.nome + ')' : 'NO'), cliente ? 'success' : 'warning');

        // ===========================================
        // 3. LEGGI DATI DAL LOCALSTORAGE
        // ===========================================
        const totale = localStorage.getItem('totaleCheckout') || localStorage.getItem('ultimoTotale') || "0.00";
        const carrelloCliente = JSON.parse(localStorage.getItem('carrelloCheckout') || 'null');
        const carrelloManager = JSON.parse(localStorage.getItem('managerCart') || 'null');
        const cartToUse = carrelloCliente || carrelloManager || [];

        debugLog(`Totale: €${totale}, Articoli: ${cartToUse.length}`);
        console.log('🛒 Carrello:', cartToUse);

        const puntiGuadagnati = Math.floor(parseFloat(totale) / 15);
        
        document.getElementById('riepilogo').innerHTML = 
            `<p>Totale da pagare: <strong>€ ${totale}</strong></p><p>Articoli: ${cartToUse.length}</p>`;

        if (cliente && puntiGuadagnati > 0) {
            document.getElementById('puntiSection').style.display = 'block';
            document.getElementById('puntiGuadagnati').textContent = `Guadagnerai ${puntiGuadagnati} ⭐ punti spesa!`;
        }

        // ===========================================
        // 4. VARIABILI DI STATO
        // ===========================================
        let metodoSelezionato = "";
        let isProcessing = false;

        // ===========================================
        // 5. FUNZIONI PRINCIPALI
        // ===========================================
        function showCheckoutToast(message) {
            const toast = document.getElementById('checkout-toast');
            toast.innerText = message;
            toast.style.display = 'block';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.style.display = 'none', 3000);
            debugLog('Toast: ' + message);
        }

        function salvaMetodo(m, el) {
            metodoSelezionato = m;
            document.querySelectorAll('.metodo').forEach(e => e.classList.remove('selezionato'));
            if (el) el.classList.add('selezionato');
            showCheckoutToast("✅ Selezionato: " + m);
            debugLog('Metodo selezionato: ' + m, 'success');
        }

        // ===========================================
        // 5. EMAILJS SETUP (AGGIORNATO CON NUOVI ID)
        // ===========================================
        async function sendReceiptEmail({ toEmail, customerName, orderTotal, orderDate, paymentMethod, address, itemsHtml, itemsText }) {
            if (typeof emailjs === 'undefined') {
                debugLog('❌ EmailJS non caricato', 'error');
                return { success: false, error: 'EmailJS non caricato' };
            }

            const templateParams = {
                to_email: toEmail,
                total_amount: orderTotal,
                payment_method: paymentMethod,
                items_list: itemsText
            };

            try {
                // Sostituiti con service_oziu4ou e template_ckwo9wt
                const response = await emailjs.send('service_oziu4ou', 'template_ckwo9wt', templateParams);
                debugLog('✅ Scontrino inviato via EmailJS', 'success');
                return { success: true, response };
            } catch (error) {
                console.error('Errore EmailJS:', error);
                debugLog('❌ Errore invio email: ' + (error.text || error.message || error), 'error');
                return { success: false, error: error.text || error.message || 'Errore EmailJS' };
            }
        }

        // ===========================================
        // 6. TEST CONNESSIONE SUPABASE
        // ===========================================
        async function testConnessione() {
            debugLog('🔍 Test connessione Supabase in corso...', 'info');
            try {
                if (typeof supabaseClient === 'undefined') {
                    throw new Error('supabaseClient non definito! Verifica che db.js sia caricato.');
                }
                
                const { data, error } = await supabaseClient
                    .from('inventario')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    throw new Error('Errore Supabase: ' + error.message);
                }
                
                debugLog('✅ Connessione OK! Trovati ' + (data?.length || 0) + ' prodotti.', 'success');
                showCheckoutToast('✅ Connessione a Supabase funzionante!');
                console.log('📦 Dati di test:', data);
                
            } catch (error) {
                debugLog('❌ ERRORE: ' + error.message, 'error');
                showCheckoutToast('❌ Errore connessione: ' + error.message);
                console.error('Errore di connessione:', error);
            }
        }

        // ===========================================
        // 7. CONFERMA ORDINE (CON INVIO EMAILJS INTEGRATO)
        // ===========================================
        async function confermaOrdine() {
            console.log('🟢 confermaOrdine() chiamata');
            debugLog('🔄 Inizio conferma ordine...', 'info');
            
            if (isProcessing) {
                debugLog('⏳ Già in elaborazione, attendi...', 'info');
                return;
            }
            
            if (!metodoSelezionato) {
                showCheckoutToast("❌ Scegli un metodo di pagamento!");
                debugLog('❌ Nessun metodo selezionato', 'error');
                return;
            }

            if (cartToUse.length === 0) {
                showCheckoutToast("❌ Carrello vuoto!");
                debugLog('❌ Carrello vuoto', 'error');
                return;
            }

            const indirizzoVia = document.getElementById('indirizzoVia').value.trim();
            const indirizzoCitta = document.getElementById('indirizzoCitta').value.trim();
            const indirizzoCap = document.getElementById('indirizzoCap').value.trim();
            const indirizzoProvincia = document.getElementById('indirizzoProvincia').value.trim();
            const checkoutEmail = document.getElementById('checkoutEmail').value.trim();

            if (!indirizzoVia || !indirizzoCitta || !indirizzoCap || !indirizzoProvincia) {
                showCheckoutToast("❌ Inserisci tutti i campi dell'indirizzo di consegna.");
                debugLog('❌ Indirizzo di consegna incompleto', 'error');
                return;
            }

            if (!checkoutEmail || !/^\S+@\S+\.\S+$/.test(checkoutEmail)) {
                showCheckoutToast("❌ Inserisci un'email valida per lo scontrino.");
                debugLog('❌ Email scontrino mancante o non valida', 'error');
                return;
            }

            try {
                isProcessing = true;
                const btn = document.getElementById('btn-conferma');
                btn.disabled = true;
                btn.textContent = '⏳ Elaborazione...';
                debugLog('⏳ Elaborazione in corso...', 'info');

                if (typeof loadInventario !== 'function') {
                    throw new Error('loadInventario non è definita. Verifica che db.js sia caricato correttamente.');
                }

                debugLog('📥 Caricamento inventario da Supabase...', 'info');
                const inventario = await loadInventario();
                
                if (!inventario || inventario.length === 0) {
                    throw new Error('Impossibile caricare l\'inventario dal database. Verifica la connessione a Supabase.');
                }

                debugLog('✅ Inventario caricato: ' + inventario.length + ' prodotti', 'success');

                cartToUse.forEach(it => {
                    const p = inventario.find(prod => prod.id === it.id);
                    if (p) {
                        const oldQty = p.qty;
                        p.qty = Math.max(0, p.qty - it.qty);
                        debugLog(`📦 ${p.nome}: ${oldQty} → ${p.qty}`, 'info');
                    } else {
                        debugLog(`⚠️ Prodotto non trovato in inventario: ID ${it.id}`, 'error');
                    }
                });

                debugLog('💾 Salvataggio inventario su Supabase...', 'info');
                await saveInventario(inventario);
                debugLog('✅ Inventario salvato', 'success');

                debugLog('💾 Registrazione vendita con INSERT...', 'info');
                const resultVendita = await registraVendita(parseFloat(totale));
                if (resultVendita.success) {
                    debugLog(`✅ Vendita registrata: €${totale} (ID: ${resultVendita.data?.[0]?.id || 'N/A'})`, 'success');
                } else {
                    throw new Error('Errore registrazione vendita: ' + resultVendita.error);
                }

                debugLog('💾 Aggiornamento budget...', 'info');
                let budget = await loadBudget();
                const oldBudget = budget;
                budget += parseFloat(totale);
                await saveBudget(budget);
                debugLog(`✅ Budget: €${oldBudget.toFixed(2)} → €${budget.toFixed(2)}`, 'success');

                if (cliente && puntiGuadagnati > 0) {
                    debugLog('💾 Aggiunta punti spesa al cliente...', 'info');
                    try {
                        const resultPunti = await DB_CLIENTI.aggiungiPuntiSpesa(cliente.id, parseFloat(totale));
                        if (resultPunti.success) {
                            debugLog(`✅ Punti spesa aggiunti: +${resultPunti.puntiAggiunti} (Totale: ${resultPunti.puntiTotali})`, 'success');
                            const clienteAggiornato = await DB_CLIENTI.getCliente(cliente.id);
                            if (clienteAggiornato) {
                                salvaClienteLoggato(clienteAggiornato);
                            }
                        } else {
                            debugLog(`⚠️ Errore nell'aggiunta punti: ${resultPunti.error}`, 'error');
                        }
                    } catch (pErr) {
                        debugLog(`⚠️ Errore aggiunta punti (non critico): ${pErr.message}`, 'error');
                    }
                }

                // Generazione testo prodotti per lo scontrino EmailJS
                const itemsHtml = cartToUse.map(item => {
                    const unitPrice = isProductOnSale(item) ? getDiscountedPrice(item.prezzo, item) : item.prezzo;
                    return `<li>${item.nome} x${item.qty} - € ${ (unitPrice * item.qty).toFixed(2) }</li>`;
                }).join('');

                const itemsText = cartToUse.map(item => {
                    const unitPrice = isProductOnSale(item) ? getDiscountedPrice(item.prezzo, item) : item.prezzo;
                    return `${item.nome} x${item.qty} - € ${ (unitPrice * item.qty).toFixed(2) }`;
                }).join('\n');

                const orderDate = new Date().toLocaleDateString('it-IT');
                const deliveryAddress = `${indirizzoVia}, ${indirizzoCap} ${indirizzoCitta} (${indirizzoProvincia})`;
                const customerName = cliente?.nome || 'Cliente';
                
                // Invio scontrino digitale via EmailJS
                const receiptResult = await sendReceiptEmail({
                    toEmail: checkoutEmail,
                    customerName,
                    orderTotal: `${parseFloat(totale).toFixed(2)}`,
                    orderDate,
                    paymentMethod: metodoSelezionato,
                    address: deliveryAddress,
                    itemsHtml: `<ul>${itemsHtml}</ul>`,
                    itemsText
                });

                if (!receiptResult.success) {
                    showCheckoutToast('⚠️ Ordine confermato, ma invio email fallito. Vedi console.');
                }

                localStorage.removeItem('carrelloCheckout');
                localStorage.removeItem('totaleCheckout');
                localStorage.removeItem('managerCart');
                localStorage.removeItem('ultimoTotale');
                debugLog('🧹 localStorage pulito', 'info');

                showCheckoutToast("✅ Ordine completato con " + metodoSelezionato + "! Grazie.");
                debugLog('✅ ORDINE COMPLETATO!', 'success');
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);

            } catch (error) {
                console.error('❌ Errore durante il checkout:', error);
                debugLog('❌ ERRORE: ' + error.message, 'error');
                showCheckoutToast("❌ Errore: " + error.message);
                const btn = document.getElementById('btn-conferma');
                btn.disabled = false;
                btn.textContent = 'Conferma Acquisto';
                isProcessing = false;
            }
        }

        // ===========================================
        // 8. VERIFICA CARICAMENTO PAGINA
        // ===========================================
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('📄 DOM caricato, verifico dipendenze...', 'info');
            
            if (typeof loadInventario === 'undefined') {
                debugLog('❌ ERRORE: db.js non caricato!', 'error');
                document.getElementById('riepilogo').innerHTML += 
                    '<p style="color:red;font-weight:bold;">⚠️ ERRORE: db.js non caricato. Ricarica la pagina.</p>';
            } else {
                debugLog('✅ db.js caricato correttamente', 'success');
            }
            
            if (typeof supabaseClient === 'undefined') {
                debugLog('❌ ERRORE: supabaseClient non definito!', 'error');
            } else {
                debugLog('✅ supabaseClient disponibile', 'success');
            }
            
            if (typeof registraVendita === 'undefined') {
                debugLog('❌ ERRORE: registraVendita non definita! Verifica db.js', 'error');
            } else {
                debugLog('✅ registraVendita disponibile', 'success');
            }
            
            setTimeout(() => {
                debugLog('🔍 Eseguo test connessione automatico...', 'info');
                testConnessione();
            }, 2000);
        });

        console.log('✅ checkout.html pronto');
        console.log('📦 carrello:', cartToUse);
        console.log('💰 totale:', totale);
    </script>
</body>
</html>
