<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Conferma Ordine</title>
    <script src="database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .metodo { margin: 15px 0; padding: 10px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; }
        .metodo:hover { border-color: #27ae60; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Seleziona Pagamento</h2>
        <div id="riepilogo"></div>
        <div id="checkout-status" style="min-height:20px; margin-bottom:10px; color:#0a0; font-weight:600;"></div>
        <div class="metodo" onclick="salvaMetodo('PayPal')">PayPal</div>
        <div class="metodo" onclick="salvaMetodo('Bonifico')">Bonifico Bancario</div>
        <div class="metodo" onclick="salvaMetodo('Contanti')">Contanti alla consegna</div>
        
        <button onclick="confermaOrdine()">Conferma Acquisto</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#777;">Torna indietro</a>
    </div>

    <script>
        // Legge il totale e il carrello dal localStorage (supporta sia cliente che manager)
        const totale = localStorage.getItem('totaleCheckout') || localStorage.getItem('ultimoTotale') || "0.00";
        const carrelloCliente = JSON.parse(localStorage.getItem('carrelloCheckout') || 'null');
        const carrelloManager = JSON.parse(localStorage.getItem('managerCart') || 'null');
        const cartToUse = carrelloCliente || carrelloManager || [];
        document.getElementById('riepilogo').innerHTML = `<p>Totale da pagare: <strong>€ ${totale}</strong></p><p>Articoli: ${cartToUse.length}</p>`;

        let metodoSelezionato = "";
        function salvaMetodo(m) { metodoSelezionato = m; document.getElementById('checkout-status').innerText = `Metodo selezionato: ${m}`; }

        function confermaOrdine() {
            if(!metodoSelezionato) {
                document.getElementById('checkout-status').style.color = '#b91c1c';
                return document.getElementById('checkout-status').innerText = "Scegli un metodo!";
            }
            const inventario = loadInventario();
            cartToUse.forEach(it => {
                const p = inventario.find(prod => prod.id === it.id);
                if (p) p.qty = Math.max(0, p.qty - it.qty);
            });
            saveInventario(inventario);

            const vendite = loadVendite();
            vendite.push({ data: new Date().toISOString().split('T')[0], totale: parseFloat(totale) });
            saveVendite(vendite);

            let budget = loadBudget();
            budget += parseFloat(totale);
            saveBudget(budget);

            localStorage.removeItem('carrelloCheckout');
            localStorage.removeItem('totaleCheckout');
            localStorage.removeItem('managerCart');
            localStorage.removeItem('ultimoTotale');

            const status = document.getElementById('checkout-status');
            status.style.color = '#0a0';
            status.innerText = `Ordine completato con ${metodoSelezionato}! Grazie.`;
            setTimeout(() => { window.location.href = "index.html"; }, 1200);
        }
    </script>
</body>
</html>
