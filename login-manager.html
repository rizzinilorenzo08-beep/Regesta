<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Manager - SinGo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="db.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-header h1 {
            color: #1E293B;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #64748B;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #1E293B;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-login:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        .form-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
        }
        .form-links a {
            color: #10B981;
            text-decoration: none;
            font-weight: 600;
        }
        .form-links a:hover {
            color: #059669;
        }
        .message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }
        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .message.success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .message.show {
            display: block;
        }
        .ruolo-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 10px;
        }
        .ruolo-super_admin { background: #8b5cf6; color: white; }
        .ruolo-admin_negozio { background: #3b82f6; color: white; }
        .ruolo-responsabile_acquisti { background: #f59e0b; color: white; }
        .ruolo-analista { background: #06b6d4; color: white; }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🛠️ Accesso Manager</h1>
            <p>Accedi con le tue credenziali aziendali</p>
        </div>

        <div id="messageBox" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Aziendale</label>
                <input type="email" id="email" placeholder="tuo.nome@singo.it" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Inserisci la tua password" required>
                <div class="forgot-password-link">
                    <a href="#" id="btnRecuperoManager">Password dimenticata?</a>
                </div>
            </div>

            <button type="submit" class="btn-login">Accedi</button>
        </form>

        <div id="recoveryPanelManager" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
            <form id="recoveryCodeFormManager">
                <div class="form-group">
                    <label for="recoveryCodeManager">Codice ricevuto via email</label>
                    <input type="text" id="recoveryCodeManager" inputmode="numeric" maxlength="6" placeholder="Codice a 6 cifre">
                    <small style="color: var(--text-muted); display: block; margin-top: 6px;">Il codice resta valido per 15 minuti.</small>
                </div>

                <button type="submit" class="btn-login" id="btnVerificaCodiceManager">Verifica codice</button>
                <button type="button" class="btn-login btn-muted-account" id="btnAnnullaRecuperoManager" style="margin-top: 10px;">Annulla</button>
            </form>
        </div>

        <div class="form-links">
            <p style="margin-top: 15px; padding-top: 15px;">
                <a href="index.html">← Torna allo Shop</a>
            </p>
        </div>
    </div>

    <script>
        emailjs.init("nLywcTRnXOOUYsDtW");

        const form = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');
        const btnRecuperoManager = document.getElementById('btnRecuperoManager');
        const recoveryPanelManager = document.getElementById('recoveryPanelManager');
        const recoveryCodeFormManager = document.getElementById('recoveryCodeFormManager');
        const recoveryCodeManager = document.getElementById('recoveryCodeManager');
        const btnVerificaCodiceManager = document.getElementById('btnVerificaCodiceManager');
        const btnAnnullaRecuperoManager = document.getElementById('btnAnnullaRecuperoManager');

        const RECOVERY_CODE_EXPIRY_MS = 15 * 60 * 1000;
        const SERVICE_ID = "service_70i2s1t";
        const CODE_TEMPLATE_ID = "template_33lrsza";
        const TEMP_PASSWORD_TEMPLATE_ID = "template_33lrsza";
        let recoveryStateManager = null;

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                mostraMessaggio('Compila tutti i campi', 'error');
                return;
            }

            const btn = form.querySelector('.btn-login');
            btn.disabled = true;
            btn.textContent = 'Login in corso...';

            try {
                // Usa DB_UTENTI.loginUtente() dal db.js
                const result = await DB_UTENTI.loginUtente(email, password);

                if (result.success) {
                    mostraMessaggio(`✓ Benvenuto ${result.utente.nome}! Reindirizzamento...`, 'success');
                    
                    // Salva l'utente in sessionStorage per la sessione
                    sessionStorage.setItem('utente_loggato', JSON.stringify(result.utente));
                    sessionStorage.setItem('manager_autenticato', 'true');
                    
                    // Redirect al manager
                    setTimeout(() => {
                        window.location.href = 'manager.html';
                    }, 1500);
                } else {
                    mostraMessaggio(result.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Accedi';
                }
            } catch (error) {
                console.error('Errore login:', error);
                mostraMessaggio('Errore durante il login. Riprova.', 'error');
                btn.disabled = false;
                btn.textContent = 'Accedi';
            }
        });

        btnRecuperoManager.addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            if (!email) {
                mostraMessaggio('Inserisci prima la tua email aziendale.', 'error');
                return;
            }

            btnRecuperoManager.style.pointerEvents = 'none';
            btnRecuperoManager.textContent = 'Invio codice...';
            mostraMessaggio('Invio del codice di verifica in corso...', 'success');

            try {
                const verifica = await DB_UTENTI.verificaEmailUtente(email);
                if (!verifica.success) {
                    mostraMessaggio(verifica.message || 'Email aziendale non trovata.', 'error');
                    return;
                }

                const codice = generaCodiceRecupero();
                const nomeUtente = verifica.utente.nome || email.split('@')[0] || 'Utente';
                const templateParams = {
                    to_email: email,
                    customer_name: nomeUtente,
                    recovery_code: codice,
                    code: codice,
                    reset_link: 'Codice di verifica: ' + codice,
                    expiry_time: '15 minuti',
                    message: 'Il tuo codice di verifica SinGo Manager e: ' + codice
                };

                const emailResponse = await emailjs.send(SERVICE_ID, CODE_TEMPLATE_ID, templateParams);

                if (emailResponse.status === 200) {
                    recoveryStateManager = {
                        email,
                        nome: nomeUtente,
                        codice,
                        expiresAt: Date.now() + RECOVERY_CODE_EXPIRY_MS
                    };
                    recoveryPanelManager.style.display = 'block';
                    recoveryCodeManager.value = '';
                    recoveryCodeManager.focus();
                    mostraMessaggio('Codice inviato. Controlla la tua email aziendale.', 'success');
                } else {
                    mostraMessaggio('Invio del codice non riuscito. Riprova.', 'error');
                }
            } catch (error) {
                console.error('Errore recupero manager:', error);
                mostraMessaggio('Impossibile inviare l\'email di recupero.', 'error');
            } finally {
                btnRecuperoManager.style.pointerEvents = '';
                btnRecuperoManager.textContent = 'Password dimenticata?';
            }
        });

        recoveryCodeFormManager.addEventListener('submit', async function(e) {
            e.preventDefault();
            const codiceInserito = recoveryCodeManager.value.trim();

            if (!recoveryStateManager) {
                mostraMessaggio('Richiedi prima un codice di recupero.', 'error');
                return;
            }

            if (!/^\d{6}$/.test(codiceInserito)) {
                mostraMessaggio('Inserisci un codice valido di 6 cifre.', 'error');
                return;
            }

            if (Date.now() > recoveryStateManager.expiresAt) {
                recoveryStateManager = null;
                mostraMessaggio('Codice scaduto. Richiedine uno nuovo.', 'error');
                return;
            }

            if (codiceInserito !== recoveryStateManager.codice) {
                mostraMessaggio('Codice non corretto.', 'error');
                return;
            }

            btnVerificaCodiceManager.disabled = true;
            btnVerificaCodiceManager.textContent = 'Genero password...';

            try {
                const passwordTemporanea = generaPasswordTemporanea();
                const resetResult = await DB_UTENTI.resetPasswordUtente(recoveryStateManager.email, passwordTemporanea);

                if (!resetResult.success) {
                    mostraMessaggio(resetResult.message || 'Aggiornamento password non riuscito.', 'error');
                    return;
                }

                const templateParams = {
                    to_email: recoveryStateManager.email,
                    customer_name: recoveryStateManager.nome,
                    temp_password: passwordTemporanea,
                    temporary_password: passwordTemporanea,
                    password: passwordTemporanea,
                    reset_link: 'Password temporanea: ' + passwordTemporanea,
                    message: 'La tua nuova password temporanea SinGo Manager e: ' + passwordTemporanea
                };

                const emailResponse = await emailjs.send(SERVICE_ID, TEMP_PASSWORD_TEMPLATE_ID, templateParams);

                if (emailResponse.status === 200) {
                    recoveryStateManager = null;
                    recoveryPanelManager.style.display = 'none';
                    document.getElementById('password').value = '';
                    mostraMessaggio('Password temporanea inviata. Usala per accedere.', 'success');
                } else {
                    mostraMessaggio('Password aggiornata, ma invio email non riuscito.', 'error');
                }
            } catch (error) {
                console.error('Errore verifica manager:', error);
                mostraMessaggio('Errore durante il recupero password.', 'error');
            } finally {
                btnVerificaCodiceManager.disabled = false;
                btnVerificaCodiceManager.textContent = 'Verifica codice';
            }
        });

        btnAnnullaRecuperoManager.addEventListener('click', function() {
            recoveryStateManager = null;
            recoveryPanelManager.style.display = 'none';
            recoveryCodeManager.value = '';
            mostraMessaggio('Recupero password annullato.', 'success');
        });

        recoveryCodeManager.addEventListener('input', function() {
            recoveryCodeManager.value = recoveryCodeManager.value.replace(/\D/g, '').slice(0, 6);
        });

        function generaCodiceRecupero() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function generaPasswordTemporanea() {
            const caratteri = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%';
            let password = 'Sg-';
            for (let i = 0; i < 9; i++) {
                password += caratteri.charAt(Math.floor(Math.random() * caratteri.length));
            }
            return password;
        }

        function mostraMessaggio(testo, tipo) {
            messageBox.textContent = testo;
            messageBox.className = `message ${tipo} show`;
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }
    </script>
    <script src="theme.js"></script>
</body>
</html>
