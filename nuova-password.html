<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripristina Password - SinGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Ripristina Password</h1>
            <p>Crea una nuova password sicura per il tuo account SinGo</p>
        </div>

        <div id="messageBox" class="message"></div>

        <div id="formContainer">
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="La tua email registrata" readonly style="background: #F8FAFC; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="newPassword">Nuova Password</label>
                    <input type="password" id="newPassword" placeholder="Almeno 6 caratteri" required>
                    <small>Scegli una password forte con lettere, numeri e simboli</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Conferma Password</label>
                    <input type="password" id="confirmPassword" placeholder="Ripeti la password" required>
                </div>

                <button type="submit" class="btn-login">Ripristina Password</button>
            </form>
        </div>

        <div id="successContainer" style="display: none; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
            <h2 style="color: #10B981; margin-bottom: 20px;">Password Ripristinata!</h2>
            <p style="color: #64748B; margin-bottom: 30px;">La tua password è stata aggiornata con successo. Accedi al tuo account con le nuove credenziali.</p>
            <a href="login-cliente.html" class="btn-login" style="display: inline-block; text-decoration: none; text-align: center;">🔓 Vai al Login</a>
        </div>

        <div class="form-links">
            <p style="margin-top: 15px;">
                <a href="login-cliente.html">← Torna al Login</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const messageBox = document.getElementById('messageBox');
        const emailInput = document.getElementById('email');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const formContainer = document.getElementById('formContainer');
        const successContainer = document.getElementById('successContainer');

        // LEGGI EMAIL DALL'URL
        function getEmailFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('email') || '';
        }

        // INIT PAGE
        function initPage() {
            const email = getEmailFromUrl();
            
            if (!email) {
                mostraMessaggio('⚠️ Link non valido: email mancante. Riprova il recupero password.', 'error');
                form.style.display = 'none';
                return;
            }

            emailInput.value = decodeURIComponent(email);
        }

        // VALIDA PASSWORD
        function validaPassword(psw) {
            if (psw.length < 6) {
                return { valid: false, msg: 'La password deve contenere almeno 6 caratteri' };
            }
            // Consiglia password forte (lettera + numero)
            if (!/[a-zA-Z]/.test(psw) || !/[0-9]/.test(psw)) {
                return { valid: true, msg: '⚠️ Consiglio: usa lettere e numeri per una password più sicura' };
            }
            return { valid: true, msg: '' };
        }

        // HANDLE FORM SUBMIT
        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // VALIDAZIONI
            if (!email) {
                mostraMessaggio('❌ Email mancante', 'error');
                return;
            }

            if (!newPassword) {
                mostraMessaggio('❌ Inserisci la nuova password', 'error');
                return;
            }

            const validazione = validaPassword(newPassword);
            if (!validazione.valid) {
                mostraMessaggio('❌ ' + validazione.msg, 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                mostraMessaggio('❌ Le password non corrispondono', 'error');
                confirmPasswordInput.focus();
                return;
            }

            // DISABILITA BOTTONE
            const btn = form.querySelector('.btn-login');
            btn.disabled = true;
            btn.textContent = 'Aggiornamento in corso...';

            try {
                // AGGIORNA PASSWORD NEL DATABASE
                // Cerca il cliente per email e aggiorna la password
                const result = await DB_CLIENTI.resetPasswordCliente(email, newPassword);

                if (result.success) {
                    // MOSTRA SUCCESSO
                    formContainer.style.display = 'none';
                    successContainer.style.display = 'block';
                    mostraMessaggio('✅ Password ripristinata con successo!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'login-cliente.html';
                    }, 3000);
                } else {
                    mostraMessaggio('❌ ' + (result.message || 'Errore nel ripristino della password'), 'error');
                    btn.disabled = false;
                    btn.textContent = 'Ripristina Password';
                }
            } catch (error) {
                console.error('Errore reset password:', error);
                mostraMessaggio('❌ Errore: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Ripristina Password';
            }
        });

        function mostraMessaggio(testo, tipo) {
            messageBox.textContent = testo;
            messageBox.className = `message ${tipo} show`;
            if (tipo === 'success') {
                setTimeout(() => { messageBox.classList.remove('show'); }, 4000);
            }
        }

        // AVVIA
        initPage();
    </script>
</body>
</html>
