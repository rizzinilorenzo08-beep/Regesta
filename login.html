<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manager</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #34495e; }
        .back-link { display: inline-block; margin-top: 15px; color: #777; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Accesso Manager</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username (Inserisci: admin)" required>
            <input type="password" id="password" placeholder="Password (Inserisci: admin)" required>
            <button type="submit">Accedi</button>
        </form>
        <div id="login-status" style="min-height:20px; margin-top:12px; color:#b91c1c; font-weight:600;"></div>
        <a href="index.html" class="back-link">← Torna allo Shop Cliente</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Credenziali demo semplici
            if (user === 'admin' && pass === 'admin') {
                window.location.href = 'manager.html';
            } else {
                const msg = document.getElementById('login-status');
                if (msg) {
                    msg.innerText = 'Credenziali errate! Usa admin / admin';
                    msg.style.color = '#b91c1c';
                }
            }
        });
    </script>
</body>
</html>
