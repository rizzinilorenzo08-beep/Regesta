<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manager</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 24px 0; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin-top: 24px; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background-color: #34495e; }
        .back-link { display: inline-block; margin-top: 15px; color: #777; text-decoration: none; font-size: 0.9rem; }
    </style>
        <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="navbar">
        <a href="home.html" class="nav-logo"><img src="logo.png" alt="SinGo"></a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="login-cliente.html">Login Cliente</a>
        </div>
    </div>

    <div class="login-card">
        <h2>Accesso Manager</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password " required>
            <button type="submit">Accedi</button>
        </form>
        <div id="login-status" style="min-height:20px; margin-top:12px; color:#b91c1c; font-weight:600;"></div>
        <a href="shop.html" class="back-link">← Torna allo Shop Cliente</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin') {
                window.location.href = 'manager.html';
            } else {
                const msg = document.getElementById('login-status');
                if (msg) {
                    msg.innerText = 'Credenziali errate!';
                    msg.style.color = '#b91c1c';
                }
            }
        });
    </script>
    <footer class="footer">
        <div>
            <div class="logo-mark">SinGo</div>
            <p>Spesa fresca, offerte esclusive e consegna direttamente a casa tua.</p>
        </div>
        <div class="footer-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="sconti.html">Offerte</a>
            <a href="termini.html">Termini e Condizioni</a>
        </div>
        <div>
            <a href="mailto:supporto@singoshop.it">supporto@singoshop.it</a>
            <p>+39 02 1234 5678</p>
        </div>
    </footer>
    <script src="theme.js"></script>
</body>
</html>
