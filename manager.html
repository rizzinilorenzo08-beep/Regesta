<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gestionale</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="database.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; --text: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; }
        .manager-grid { display: grid; grid-template-columns: 1.2fr 360px; gap: 20px; align-items: flex-start; }
        .cart-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 120px; max-height: calc(100vh - 180px); overflow-y: auto; }
        .cart-panel h3 { margin-bottom: 16px; }
        .cart-item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-item-row:last-child { border-bottom: none; }
        .cart-actions { display: flex; gap: 10px; margin-top: 12px; justify-content: flex-end; }
        .cart-actions button { flex: 1; }
        .cart-panel.hide { display: none; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
        .modal-card { background: white; border-radius: 18px; width: 100%; max-width: 520px; padding: 30px; box-shadow: 0 20px 45px rgba(0,0,0,0.2); text-align: center; }
        .modal-card h2 { margin-bottom: 16px; font-size: 1.4rem; }
        .modal-card p { color: #4a5568; margin-bottom: 24px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .modal-actions button { min-width: 120px; padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; }
        .modal-confirm { background: #10b981; color: white; }
        .modal-cancel { background: #e2e8f0; color: #2d3748; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: rgba(45,55,72,0.95); color: white; padding: 14px 20px; border-radius: 14px; box-shadow: 0 16px 40px rgba(0,0,0,0.2); opacity: 0; transform: translateY(16px); transition: opacity 0.25s ease, transform 0.25s ease; z-index: 1000; }
        .toast.show { opacity: 1; transform: translateY(0); }
        
        .sidebar { width: 250px; background-color: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .menu-label { font-size: 0.8rem; text-transform: uppercase; color: #aaa; margin-top: 10px; }
        .category-btn { background: none; border: none; color: white; text-align: left; padding: 10px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .category-btn:hover, .category-btn.active { background-color: var(--secondary); }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; text-decoration: none; font-weight: bold; margin-top: auto; }
        
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .budget-box { background: var(--secondary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        
        .section { display: none; }
        .section.active { display: block; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary); color: white; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: bold; }
        .btn-qty { border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; margin-right: 5px;}
        .btn-plus { background-color: var(--secondary); }
        .btn-minus { background-color: #e74c3c; }
        .costo-info { font-size: 0.8rem; color: #777; display: block; margin-top: 5px; }

        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; height: 400px;}
        .stats-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid var(--secondary); }
        .card h3 { color: #777; font-size: 1rem; }
        .card p { font-size: 2rem; font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛠️ Pannello Manager</h2>
        
        <div class="menu-label">Viste</div>
        <button class="category-btn active" onclick="cambiaVista('magazzino', this)">📦 Magazzino</button>
        <button class="category-btn" onclick="cambiaVista('finanze', this)">📈 Finanze e Grafici</button>
        
        <div id="menu-categorie" style="display: flex; flex-direction: column; gap: 5px;">
            <div class="menu-label">Filtra Categorie</div>
            <button class="category-btn sub-btn active" onclick="filtraCategoria('Tutte')">Tutte</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Alimentari')">Alimentari</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Cura della casa')">Cura della casa</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Giardinaggio')">Giardinaggio</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Macchina')">Macchina</button>
        </div>

        <a href="index.html" class="logout-btn">Esci alla Vista Cliente</a>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="titolo-sezione">Gestione Magazzino</h1>
            <div class="budget-box" id="display-budget-top">Budget: € 0.00</div>
        </div>

        <div id="vista-magazzino" class="section active">
            <div class="controls">
                <select id="filtro-stato" onchange="aggiornaTabella()">
                    <option value="Tutti">Tutti gli stati di scorta</option>
                    <option value="Scarso">🟠 Scarsi (< 20%)</option>
                    <option value="Medio">🟡 Medi (20% - 50%)</option>
                    <option value="Buono">🟢 Buoni (> 50%)</option>
                </select>
                <button style="margin-left:auto; padding:8px 12px; border-radius:6px; border:none; background:#10b981; color:white; cursor:pointer;" onclick="toggleManagerCart()">Mostra / Nascondi Carrello</button>
                <button style="padding:8px 12px; border-radius:6px; border:none; background:#3b82f6; color:white; cursor:pointer; margin-left:8px;" onclick="apriEditorStock()">Editor Stock</button>
            </div>

            <div class="manager-grid">
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th>Prodotto</th>
                                <th>Stato Scorta</th>
                                <th>Giacenza</th>
                                <th>Prezzo Vendita</th>
                                <th>Azioni (Carrello)</th>
                            </tr>
                        </thead>
                        <tbody id="tabella-inventario"></tbody>
                    </table>
                </div>
                <div id="manager-cart" class="cart-panel">
                    <h3>Carrello Manager</h3>
                    <div id="manager-cart-items" style="margin-bottom:16px;"></div>
                    <div style="text-align:right; margin-top:10px; font-weight:bold;">Totale: <span id="manager-cart-total">€ 0.00</span></div>
                    <div class="cart-actions">
                        <button onclick="procCompraManager()" style="background:#27ae60; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Procedi all'acquisto</button>
                        <button onclick="svuotaCarrelloManager()" style="background:#e74c3c; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Svuota Carrello</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="vista-finanze" class="section">
            <div class="stats-cards">
                <div class="card">
                    <h3>Budget Aziendale Disponibile</h3>
                    <p id="budget-finanze">€ 0.00</p>
                </div>
                <div class="card">
                    <h3>Incasso Totale Vendite</h3>
                    <p id="incasso-totale">€ 0.00</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="graficoVendite"></canvas>
            </div>
        </div>

        <div id="vista-editor-stock" class="section">
            <h2>Editor Stock</h2>
            <div id="editor-stock-list" style="margin-top:10px; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="margin-top:12px;"><button onclick="salvaEditorStock()" style="background:#3b82f6; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Salva Modifiche</button></div>
        </div>

    </div>

    <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-card">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <div class="modal-actions">
                <button id="modal-confirm" class="modal-confirm">Conferma</button>
                <button id="modal-cancel" class="modal-cancel">Annulla</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let inventario = [];
        let vendite = [];
        let expenses = [];
        let budgetAziendale = 0;
        let categoriaAttuale = 'Tutte';
        let chartInstance = null;
        let modalCallback = null;

        function showModal(title, message, callback) {
            const backdrop = document.getElementById('modal-backdrop');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');
            titleEl.innerText = title;
            messageEl.innerText = message;
            modalCallback = callback;
            confirmBtn.onclick = () => {
                hideModal();
                if (typeof modalCallback === 'function') modalCallback(true);
            };
            cancelBtn.onclick = () => {
                hideModal();
                if (typeof modalCallback === 'function') modalCallback(false);
            };
            backdrop.style.display = 'flex';
        }

        function hideModal() {
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.style.display = 'none';
            modalCallback = null;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.background = type === 'error' ? 'rgba(220,38,38,0.95)' : type === 'success' ? 'rgba(16,185,129,0.95)' : 'rgba(45,55,72,0.95)';
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function inizializzaBudget() {
            let budgetSalvato = localStorage.getItem('budgetAziendale');
            if (budgetSalvato === null) {
                budgetAziendale = 5000;
                saveBudget(budgetAziendale);
                showToast('Budget aziendale impostato a € 5.000');
            } else {
                budgetAziendale = parseFloat(budgetSalvato);
            }
            aggiornaUIBudget();
        }

        function aggiornaUIBudget() {
            document.getElementById('display-budget-top').innerText = `Budget: € ${budgetAziendale.toFixed(2)}`;
            document.getElementById('budget-finanze').innerText = `€ ${budgetAziendale.toFixed(2)}`;
        }

        // provo a modificare questa funzione "caricaDati"
        function caricaDati() {
            ensureDatabase();
            inventario = loadInventario();
            
            // 2. SE IL LOCALSTORAGE È VUOTO, INSERISCE I DATI DI BASE AUTOMATICAMENTE
            if (inventario.length === 0) {
                inventario = [
                    { id: 1, nome: "Latte Intero", cat: "Alimentari", sub: "Da frigo", qty: 45, maxQty: 100, prezzo: 1.20 },
                    { id: 2, nome: "Piselli Surgelati", cat: "Alimentari", sub: "Da freezer", qty: 20, maxQty: 60, prezzo: 2.50 },
                    { id: 3, nome: "Biscotti Frollini", cat: "Alimentari", sub: "Biscotti", qty: 60, maxQty: 80, prezzo: 1.80 },
                    { id: 4, nome: "Acqua Naturale 1.5L", cat: "Alimentari", sub: "Bevande", qty: 120, maxQty: 200, prezzo: 0.50 },
                    { id: 5, nome: "Detersivo Piatti", cat: "Cura della casa", sub: "Cucina", qty: 30, maxQty: 50, prezzo: 1.90 },
                    { id: 6, nome: "Scopa", cat: "Cura della casa", sub: "Casa", qty: 5, maxQty: 30, prezzo: 5.00 },
                    { id: 7, nome: "Ammorbidente", cat: "Cura della casa", sub: "Bucato", qty: 25, maxQty: 50, prezzo: 3.20 },
                    { id: 8, nome: "Pianta di Ficus", cat: "Giardinaggio", sub: "Piante", qty: 10, maxQty: 20, prezzo: 15.00 },
                    { id: 9, nome: "Semi di Pomodoro", cat: "Giardinaggio", sub: "Semi", qty: 50, maxQty: 100, prezzo: 1.00 },
                    { id: 10, nome: "Tubo Irrigazione", cat: "Giardinaggio", sub: "Irrigazione", qty: 8, maxQty: 50, prezzo: 25.00 },
                    { id: 11, nome: "Rastrello", cat: "Giardinaggio", sub: "Cura del giardino", qty: 12, maxQty: 25, prezzo: 12.00 },
                    { id: 12, nome: "Liquido Tergicristalli", cat: "Macchina", sub: "Pulizia", qty: 15, maxQty: 100, prezzo: 4.50 },
                    { id: 13, nome: "Olio Motore 5W-30", cat: "Macchina", sub: "Manutenzione", qty: 18, maxQty: 40, prezzo: 9.90 }
                ];
                // Salva i dati di ripiego nel localStorage così l'area clienti vedrà gli stessi identici prodotti
                saveInventario(inventario);
            }

    vendite = loadVendite();
    expenses = loadExpenses();
    managerCart = loadManagerCart();
    budgetAziendale = loadBudget();
    inizializzaBudget();
    aggiornaTabella();
    aggiornaFinanze();
    renderManagerCart();
}

        function cambiaVista(vista, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('vista-' + vista).classList.add('active');
            
            document.querySelectorAll('.sidebar > .category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('menu-categorie').style.display = vista === 'magazzino' ? 'flex' : 'none';
            document.getElementById('titolo-sezione').innerText = vista === 'magazzino' ? "Gestione Magazzino" : "Report Finanziario";

            if (vista === 'finanze') aggiornaFinanze();
        }

        function valutaStato(qty, maxQty) {
            const perc = (qty / maxQty) * 100;
            if (perc < 20) return { testo: 'Scarso', colore: 'darkorange' };
            if (perc <= 50) return { testo: 'Medio', colore: '#f1c40f' };
            return { testo: 'Buono', colore: '#27ae60' };
        }

        let managerCart = [];

        function aggiornaTabella() {
            const tbody = document.getElementById('tabella-inventario');
            const filtroStato = document.getElementById('filtro-stato').value;
            tbody.innerHTML = '';

            let filtrati = categoriaAttuale === 'Tutte' ? inventario : inventario.filter(item => item.cat === categoriaAttuale);

            if (filtroStato !== 'Tutti') {
                filtrati = filtrati.filter(item => valutaStato(item.qty, item.maxQty).testo === filtroStato);
            }

            filtrati.forEach(item => {
                const stato = valutaStato(item.qty, item.maxQty);
                const percentuale = ((item.qty / item.maxQty) * 100).toFixed(0);
                const costoAcquisto = item.prezzo * 0.55; // Sconto 45% per il magazzino
                const remaining = Math.max(0, item.maxQty - item.qty);
                const desiredId = `desired-${item.id}`;
                const disabled = remaining === 0 ? 'disabled' : '';
                const placeholder = remaining === 0 ? 'Esaurito' : '1';

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${item.nome}</strong><br>
                            <small style="color: #777;">${item.cat} > ${item.sub}</small>
                        </td>
                        <td><span class="badge" style="background-color: ${stato.colore}">${stato.testo} (${percentuale}%)</span></td>
                        <td><strong id="giac-${item.id}">${item.qty}</strong> / <span id="max-${item.id}">${item.maxQty}</span></td>
                        <td>€ ${item.prezzo.toFixed(2)}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:6px;">
                                <button class="btn-qty btn-minus" onclick="modificaDesired(${item.id}, -1)" ${disabled}>-</button>
                                <input id="${desiredId}" type="number" value="${placeholder}" min="1" max="${remaining}" style="width:60px; padding:6px; border-radius:4px; border:1px solid #ddd; text-align:center;" onchange="normalizeDesired(${item.id})" ${disabled}>
                                <button class="btn-qty btn-plus" onclick="modificaDesired(${item.id}, 1)" ${disabled}>+</button>
                                <button style="background:#10b981; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer;" onclick="aggiungiAlCarrelloManager(${item.id})" ${disabled}>Aggiungi al carrello</button>
                            </div>
                            <span class="costo-info">Costo rifornimento: €${costoAcquisto.toFixed(2)}/pz - Spazio disponibile: ${remaining}</span>
                        </td>
                    </tr>
                `;
            });
        }

        function modificaDesired(id, delta) {
            const input = document.getElementById(`desired-${id}`);
            if (!input) return;
            let val = parseInt(input.value || '0', 10) + delta;
            const prod = inventario.find(p => p.id === id);
            if (!prod) return;
            const remaining = Math.max(0, prod.maxQty - prod.qty);
            if (val < 1) val = 1;
            if (val > remaining) val = remaining;
            input.value = val;
        }

        function normalizeDesired(id) {
            const input = document.getElementById(`desired-${id}`);
            const prod = inventario.find(p => p.id === id);
            if (!input || !prod) return;
            const remaining = Math.max(0, prod.maxQty - prod.qty);
            let val = parseInt(input.value || '0', 10);
            if (isNaN(val) || val < 1) val = 1;
            if (val > remaining) val = remaining;
            input.value = val;
        }

        function aggiungiAlCarrelloManager(id) {
            const input = document.getElementById(`desired-${id}`);
            const qty = input ? parseInt(input.value || '1', 10) : 1;
            const p = inventario.find(i => i.id === id);
            if (!p) {
                showToast('Prodotto non trovato', 'error');
                return;
            }
            const remaining = Math.max(0, p.maxQty - p.qty);
            if (remaining === 0) {
                showToast('Stock già pieno per questo prodotto', 'error');
                return;
            }
            if (qty > remaining) {
                showToast('Quantità richiesta maggiore dello spazio disponibile', 'error');
                return;
            }

            const existing = managerCart.find(c => c.id === id);
            if (existing) {
                if (existing.qty + qty > remaining) {
                    showToast('Superi lo spazio disponibile per questo prodotto', 'error');
                    return;
                }
                existing.qty += qty;
            } else {
                managerCart.push({ id: p.id, nome: p.nome, prezzo: p.prezzo, qty: qty });
            }
            saveManagerCart(managerCart);
            renderManagerCart();
            showToast('Aggiunto al carrello manager', 'success');
        }

        function renderManagerCart() {
            const el = document.getElementById('manager-cart-items');
            if (!el) return;
            if (managerCart.length === 0) el.innerHTML = '<em>Carrello vuoto</em>';
            else el.innerHTML = managerCart.map(c => `<div style="display:flex; justify-content:space-between; padding:6px 0;">${c.nome} x${c.qty} <strong>€ ${(c.prezzo*c.qty).toFixed(2)}</strong></div>`).join('');
            const tot = managerCart.reduce((s, i) => s + i.prezzo * i.qty, 0);
            document.getElementById('manager-cart-total').innerText = `€ ${tot.toFixed(2)}`;
        }

        function toggleManagerCart() {
            const el = document.getElementById('manager-cart');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            renderManagerCart();
        }

        function svuotaCarrelloManager() {
            showModal('Svuota carrello manager', 'Sei sicuro di voler svuotare completamente il carrello manager? Questa operazione non può essere annullata.', confirmed => {
                if (!confirmed) return;
                managerCart = [];
                clearManagerCart();
                renderManagerCart();
                showToast('Carrello manager svuotato', 'success');
            });
        }

        function procCompraManager() {
            if (managerCart.length === 0) {
                showToast('Carrello vuoto', 'error');
                return;
            }
            for (const it of managerCart) {
                const prod = inventario.find(p => p.id === it.id);
                const remaining = prod ? Math.max(0, prod.maxQty - prod.qty) : 0;
                if (!prod || remaining < it.qty) {
                    showToast(`Quantità non disponibile per ${it.nome}`, 'error');
                    return;
                }
            }
            showModal('Conferma acquisto manager', 'Vuoi procedere con l\'acquisto dei prodotti presenti nel carrello manager?', confirmed => {
                if (!confirmed) return;
                const totale = managerCart.reduce((s,i) => s + i.prezzo * i.qty * 0.55, 0);
                managerCart.forEach(it => {
                    const prod = inventario.find(p => p.id === it.id);
                    prod.qty += it.qty;
                });
                expenses.push({ data: new Date().toISOString().split('T')[0], totale: totale });
                saveInventario(inventario);
                saveExpenses(expenses);
                budgetAziendale -= totale;
                saveBudget(budgetAziendale);
                managerCart = [];
                clearManagerCart();
                aggiornaUIBudget();
                aggiornaTabella();
                renderManagerCart();
                showToast('Acquisto manager registrato con successo', 'success');
            });
        }

        function apriEditorStock() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('vista-editor-stock').classList.add('active');
            renderEditorStock();
        }

        function renderEditorStock() {
            const list = document.getElementById('editor-stock-list');
            list.innerHTML = '';
            inventario.forEach(p => {
                list.innerHTML += `<div style="display:flex; gap:10px; align-items:center; background:white; padding:10px; border-radius:8px;"><div style="flex:1;"><strong>${p.nome}</strong><div style="font-size:0.9rem;color:#666;">Giacenza attuale: ${p.qty}</div></div><div>Max: <input type="number" id="editor-max-${p.id}" value="${p.maxQty}" min="1" style="width:100px; padding:6px; border-radius:4px; border:1px solid #ddd;"></div></div>`;
            });
        }

        function salvaEditorStock() {
            inventario.forEach(p => {
                const el = document.getElementById(`editor-max-${p.id}`);
                if (el) {
                    let v = parseInt(el.value || p.maxQty, 10);
                    if (isNaN(v) || v < 1) v = p.maxQty;
                    p.maxQty = v;
                }
            });
            saveInventario(inventario);
            showToast('Max stock aggiornati', 'success');
            // Torna alla vista magazzino
            cambiaVista('magazzino', document.querySelector('.sidebar > .category-btn'));
            aggiornaTabella();
        }

        function compraProdotto(id) {
            const item = inventario.find(i => i.id === id);
            if (item) {
                if (item.qty >= item.maxQty) {
                    showToast("Magazzino pieno per questo prodotto!", 'error');
                    return;
                }
                const costo = item.prezzo * 0.55;
                if (budgetAziendale >= costo) {
                    budgetAziendale -= costo;
                    item.qty += 1;
                    saveBudget(budgetAziendale);
                    saveInventario(inventario);
                    aggiornaUIBudget();
                    aggiornaTabella();
                    showToast("Prodotto acquistato per il magazzino", 'success');
                } else {
                    showToast("Fondi aziendali insufficienti per acquistare questo prodotto.", 'error');
                }
            }
        }

        function rimuoviProdotto(id) {
            const item = inventario.find(i => i.id === id);
            if (item && item.qty > 0) {
                item.qty -= 1; // Rimuove prodotto senza rimborsi (es. merce rotta/scaduta)
                saveInventario(inventario);
                aggiornaTabella();
            }
        }

        function filtraCategoria(categoria) {
            categoriaAttuale = categoria;
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            aggiornaTabella();
        }

        function aggiornaFinanze() {
            const incassoTotale = vendite.reduce((sum, v) => sum + v.totale, 0);
            const speseTotali = expenses.reduce((sum, e) => sum + e.totale, 0);
            document.getElementById('incasso-totale').innerText = `€ ${incassoTotale.toFixed(2)} / Spese: € ${speseTotali.toFixed(2)}`;

            const venditePerData = {};
            vendite.forEach(v => {
                venditePerData[v.data] = (venditePerData[v.data] || 0) + v.totale;
            });

            const uscitePerData = {};
            expenses.forEach(e => {
                uscitePerData[e.data] = (uscitePerData[e.data] || 0) + e.totale;
            });

            const etichetteDate = Array.from(new Set([...Object.keys(venditePerData), ...Object.keys(uscitePerData)])).sort();
            const datiIncasso = etichetteDate.map(d => venditePerData[d] || 0);
            const datiUscite = etichetteDate.map(d => uscitePerData[d] || 0);
            const expenseColor = speseTotali > incassoTotale ? '#e74c3c' : '#f59e0b';
            const expenseBg = speseTotali > incassoTotale ? 'rgba(231,76,60,0.2)' : 'rgba(245,158,11,0.2)';

            if (etichetteDate.length === 0) {
                etichetteDate.push('Oggi');
                datiIncasso.push(0);
                datiUscite.push(0);
            }

            const ctx = document.getElementById('graficoVendite').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: etichetteDate,
                    datasets: [
                        {
                            label: 'Entrate (€)',
                            data: datiIncasso,
                            borderColor: '#27ae60',
                            backgroundColor: 'rgba(39,174,96,0.2)',
                            tension: 0.3,
                            fill: true,
                            borderWidth: 2
                        },
                        {
                            label: 'Uscite (€)',
                            data: datiUscite,
                            borderColor: expenseColor,
                            backgroundColor: expenseBg,
                            tension: 0.3,
                            fill: true,
                            borderWidth: 2
                        }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        caricaDati();
    </script>
</body>
</html>
