<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gestionale</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="database.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; --text: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        .sidebar { width: 250px; background-color: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .menu-label { font-size: 0.8rem; text-transform: uppercase; color: #aaa; margin-top: 10px; }
        .category-btn { background: none; border: none; color: white; text-align: left; padding: 10px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .category-btn:hover, .category-btn.active { background-color: var(--secondary); }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; text-decoration: none; font-weight: bold; margin-top: auto; }
        
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .budget-box { background: var(--secondary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        
        .section { display: none; }
        .section.active { display: block; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary); color: white; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; color: white; font-weight: bold; }
        .btn-qty { border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; margin-right: 5px;}
        .btn-plus { background-color: var(--secondary); }
        .btn-minus { background-color: #e74c3c; }
        .costo-info { font-size: 0.8rem; color: #777; display: block; margin-top: 5px; }

        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; height: 400px;}
        .stats-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid var(--secondary); }
        .card h3 { color: #777; font-size: 1rem; }
        .card p { font-size: 2rem; font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛠️ Pannello Manager</h2>
        
        <div class="menu-label">Viste</div>
        <button class="category-btn active" onclick="cambiaVista('magazzino', this)">📦 Magazzino</button>
        <button class="category-btn" onclick="cambiaVista('finanze', this)">📈 Finanze e Grafici</button>
        
        <div id="menu-categorie" style="display: flex; flex-direction: column; gap: 5px;">
            <div class="menu-label">Filtra Categorie</div>
            <button class="category-btn sub-btn active" onclick="filtraCategoria('Tutte')">Tutte</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Alimentari')">Alimentari</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Cura della casa')">Cura della casa</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Giardinaggio')">Giardinaggio</button>
            <button class="category-btn sub-btn" onclick="filtraCategoria('Macchina')">Macchina</button>
        </div>

        <a href="index.html" class="logout-btn">Esci alla Vista Cliente</a>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="titolo-sezione">Gestione Magazzino</h1>
            <div class="budget-box" id="display-budget-top">Budget: € 0.00</div>
        </div>
        <div id="status-message" style="margin-bottom:16px; min-height:20px; color:#0a0; font-weight:600;"></div>

        <div id="vista-magazzino" class="section active">
            <div class="controls">
                <select id="filtro-stato" onchange="aggiornaTabella()">
                    <option value="Tutti">Tutti gli stati di scorta</option>
                    <option value="Scarso">🟠 Scarsi (< 20%)</option>
                    <option value="Medio">🟡 Medi (20% - 50%)</option>
                    <option value="Buono">🟢 Buoni (> 50%)</option>
                </select>
                <button id="toggle-manager-cart-btn" style="margin-left:auto; padding:8px 12px; border-radius:6px; border:none; background:#10b981; color:white; cursor:pointer;" onclick="toggleManagerCart()">Nascondi Carrello Manager</button>
                <button style="padding:8px 12px; border-radius:6px; border:none; background:#3b82f6; color:white; cursor:pointer; margin-left:8px;" onclick="apriEditorStock()">Editor Stock</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Prodotto</th>
                        <th>Stato Scorta</th>
                        <th>Giacenza</th>
                        <th>Prezzo Vendita</th>
                        <th>Azioni (Acquista/Rimuovi)</th>
                    </tr>
                </thead>
                <tbody id="tabella-inventario"></tbody>
            </table>
            <div id="manager-cart" style="margin-top:20px; display:block;">
                <h3>Carrello Manager</h3>
                <div id="manager-cart-items" style="background:white; padding:15px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.06);"></div>
                <div style="text-align:right; margin-top:10px; font-weight:bold;">Totale: <span id="manager-cart-total">€ 0.00</span></div>
                <div style="display:flex; gap:10px; margin-top:10px; justify-content:flex-end;">
                    <button onclick="procCompraManager()" style="background:#27ae60; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Procedi all'acquisto</button>
                    <button onclick="svuotaCarrelloManager()" style="background:#e74c3c; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Svuota Carrello</button>
                </div>
            </div>
        </div>

        <div id="vista-finanze" class="section">
            <div class="stats-cards">
                <div class="card">
                    <h3>Budget Aziendale Disponibile</h3>
                    <p id="budget-finanze">€ 0.00</p>
                </div>
                <div class="card">
                    <h3>Incasso Totale Vendite</h3>
                    <p id="incasso-totale">€ 0.00</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="graficoVendite"></canvas>
            </div>
        </div>

        <div id="vista-editor-stock" class="section">
            <h2>Editor Stock</h2>
            <div id="editor-stock-list" style="margin-top:10px; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="margin-top:12px;"><button onclick="salvaEditorStock()" style="background:#3b82f6; color:white; padding:10px 14px; border-radius:6px; border:none; cursor:pointer;">Salva Modifiche</button></div>
        </div>

    </div>

    <script>
        let inventario = [];
        let vendite = [];
        let budgetAziendale = 0;
        let categoriaAttuale = 'Tutte';
        let chartInstance = null;

        function inizializzaBudget() {
            budgetAziendale = loadBudget();
            aggiornaUIBudget();
        }

        function aggiornaUIBudget() {
            document.getElementById('display-budget-top').innerText = `Budget: € ${budgetAziendale.toFixed(2)}`;
            document.getElementById('budget-finanze').innerText = `€ ${budgetAziendale.toFixed(2)}`;
        }

        // provo a modificare questa funzione "caricaDati"
        function caricaDati() {
            inventario = loadInventario();
            vendite = loadVendite();
            managerCart = loadManagerCart();
            inizializzaBudget();
            aggiornaTabella();
            aggiornaFinanze();
            renderManagerCart();
        }

        function cambiaVista(vista, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('vista-' + vista).classList.add('active');
            
            document.querySelectorAll('.sidebar > .category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('menu-categorie').style.display = vista === 'magazzino' ? 'flex' : 'none';
            document.getElementById('titolo-sezione').innerText = vista === 'magazzino' ? "Gestione Magazzino" : "Report Finanziario";

            if (vista === 'finanze') aggiornaFinanze();
        }

        function valutaStato(qty, maxQty) {
            const perc = (qty / maxQty) * 100;
            if (perc < 20) return { testo: 'Scarso', colore: 'darkorange' };
            if (perc <= 50) return { testo: 'Medio', colore: '#f1c40f' };
            return { testo: 'Buono', colore: '#27ae60' };
        }

        let managerCart = [];

        function aggiornaTabella() {
            const tbody = document.getElementById('tabella-inventario');
            const filtroStato = document.getElementById('filtro-stato').value;
            tbody.innerHTML = '';

            let filtrati = categoriaAttuale === 'Tutte' ? inventario : inventario.filter(item => item.cat === categoriaAttuale);

            if (filtroStato !== 'Tutti') {
                filtrati = filtrati.filter(item => valutaStato(item.qty, item.maxQty).testo === filtroStato);
            }

            filtrati.forEach(item => {
                const stato = valutaStato(item.qty, item.maxQty);
                const percentuale = ((item.qty / item.maxQty) * 100).toFixed(0);
                const costoAcquisto = item.prezzo * 0.55; // Sconto 45% per il magazzino
                const desiredId = `desired-${item.id}`;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${item.nome}</strong><br>
                            <small style="color: #777;">${item.cat} > ${item.sub}</small>
                        </td>
                        <td><span class="badge" style="background-color: ${stato.colore}">${stato.testo} (${percentuale}%)</span></td>
                        <td><strong id="giac-${item.id}">${item.qty}</strong> / <span id="max-${item.id}">${item.maxQty}</span></td>
                        <td>€ ${item.prezzo.toFixed(2)}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:6px;">
                                <button class="btn-qty btn-minus" onclick="modificaDesired(${item.id}, -1)">-</button>
                                <input id="${desiredId}" type="number" value="1" min="1" max="${item.qty}" style="width:60px; padding:6px; border-radius:4px; border:1px solid #ddd; text-align:center;" onchange="normalizeDesired(${item.id})">
                                <button class="btn-qty btn-plus" onclick="modificaDesired(${item.id}, 1)">+</button>
                                <button style="background:#10b981; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer;" onclick="aggiungiAlCarrelloManager(${item.id})">Aggiungi al carrello</button>
                            </div>
                            <span class="costo-info">Costo rifornimento: €${costoAcquisto.toFixed(2)}/pz</span>
                        </td>
                    </tr>
                `;
            });
        }

        function modificaDesired(id, delta) {
            const input = document.getElementById(`desired-${id}`);
            if (!input) return;
            let val = parseInt(input.value || '0', 10) + delta;
            const prod = inventario.find(p => p.id === id);
            if (!prod) return;
            if (val < 1) val = 1;
            if (val > prod.qty) val = prod.qty;
            input.value = val;
        }

        function normalizeDesired(id) {
            const input = document.getElementById(`desired-${id}`);
            const prod = inventario.find(p => p.id === id);
            if (!input || !prod) return;
            let val = parseInt(input.value || '0', 10);
            if (isNaN(val) || val < 1) val = 1;
            if (val > prod.qty) val = prod.qty;
            input.value = val;
        }

        function aggiungiAlCarrelloManager(id) {
            const input = document.getElementById(`desired-${id}`);
            const qty = input ? parseInt(input.value || '1', 10) : 1;
            const p = inventario.find(i => i.id === id);
            if (!p) return showMessage('Prodotto non trovato', 'error');
            if (qty > p.qty) return showMessage('Quantità richiesta maggiore della giacenza', 'error');

            const existing = managerCart.find(c => c.id === id);
            if (existing) {
                if (existing.qty + qty > p.qty) return showMessage('Superi la giacenza disponibile', 'error');
                existing.qty += qty;
            } else {
                managerCart.push({ id: p.id, nome: p.nome, prezzo: p.prezzo, qty: qty });
            }
            saveManagerCart(managerCart);
            renderManagerCart();
            showMessage('Aggiunto al carrello manager');
        }

        function renderManagerCart() {
            const el = document.getElementById('manager-cart-items');
            if (!el) return;
            if (managerCart.length === 0) el.innerHTML = '<em>Carrello vuoto</em>';
            else el.innerHTML = managerCart.map(c => `<div style="display:flex; justify-content:space-between; padding:6px 0;">${c.nome} x${c.qty} <strong>€ ${(c.prezzo*c.qty).toFixed(2)}</strong></div>`).join('');
            const tot = managerCart.reduce((s, i) => s + i.prezzo * i.qty, 0);
            document.getElementById('manager-cart-total').innerText = `€ ${tot.toFixed(2)}`;
        }

        function toggleManagerCart() {
            const el = document.getElementById('manager-cart');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            const button = document.querySelector('.controls button');
            if (button) {
                button.innerText = el.style.display === 'none' ? 'Visualizza Carrello Manager' : 'Nascondi Carrello Manager';
            }
            renderManagerCart();
        }

        function svuotaCarrelloManager() {
            managerCart = [];
            clearManagerCart();
            renderManagerCart();
            showMessage('Carrello manager svuotato');
        }

        function procCompraManager() {
            if (managerCart.length === 0) return showMessage('Carrello manager vuoto', 'error');
            for (const it of managerCart) {
                const prod = inventario.find(p => p.id === it.id);
                if (!prod || prod.qty < it.qty) return showMessage(`Quantità non disponibile per ${it.nome}`, 'error');
            }
            const totale = managerCart.reduce((s,i) => s + i.prezzo * i.qty, 0);
            managerCart.forEach(it => {
                const prod = inventario.find(p => p.id === it.id);
                prod.qty -= it.qty;
            });
            vendite.push({ data: new Date().toISOString().split('T')[0], totale: totale });
            budgetAziendale += totale;
            saveInventario(inventario);
            saveVendite(vendite);
            saveBudget(budgetAziendale);
            managerCart = [];
            clearManagerCart();
            aggiornaUIBudget();
            aggiornaTabella();
            renderManagerCart();
            showMessage('Acquisto manager registrato con successo');
        }

        function apriEditorStock() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('vista-editor-stock').classList.add('active');
            renderEditorStock();
        }

        function renderEditorStock() {
            const list = document.getElementById('editor-stock-list');
            list.innerHTML = '';
            inventario.forEach(p => {
                list.innerHTML += `<div style="display:flex; gap:10px; align-items:center; background:white; padding:10px; border-radius:8px;"><div style="flex:1;"><strong>${p.nome}</strong><div style="font-size:0.9rem;color:#666;">Giacenza attuale: ${p.qty}</div></div><div>Max: <input type="number" id="editor-max-${p.id}" value="${p.maxQty}" min="1" style="width:100px; padding:6px; border-radius:4px; border:1px solid #ddd;"></div></div>`;
            });
        }

        function salvaEditorStock() {
            inventario.forEach(p => {
                const el = document.getElementById(`editor-max-${p.id}`);
                if (el) {
                    let v = parseInt(el.value || p.maxQty, 10);
                    if (isNaN(v) || v < 1) v = p.maxQty;
                    p.maxQty = v;
                }
            });
            saveInventario(inventario);
            showMessage('Massimi scorte aggiornati');
            cambiaVista('magazzino', document.querySelector('.sidebar > .category-btn'));
            aggiornaTabella();
        }

        function compraProdotto(id) {
            const item = inventario.find(i => i.id === id);
            if (item) {
                if (item.qty >= item.maxQty) return showMessage("Magazzino pieno per questo prodotto!", 'error');
                const costo = item.prezzo * 0.55;
                if (budgetAziendale >= costo) {
                    budgetAziendale -= costo;
                    item.qty += 1;
                    saveBudget(budgetAziendale);
                    saveInventario(inventario);
                    aggiornaUIBudget();
                    aggiornaTabella();
                    showMessage('Prodotto acquistato per il magazzino');
                } else {
                    showMessage("Fondi aziendali insufficienti per acquistare questo prodotto.", 'error');
                }
            }
        }

        function rimuoviProdotto(id) {
            const item = inventario.find(i => i.id === id);
            if (item && item.qty > 0) {
                item.qty -= 1; // Rimuove prodotto senza rimborsi (es. merce rotta/scaduta)
                saveInventario(inventario);
                aggiornaTabella();
                showMessage('Prodotto rimosso dal magazzino');
            }
        }

        function filtraCategoria(categoria) {
            categoriaAttuale = categoria;
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            aggiornaTabella();
        }

        function showMessage(text, type = 'info') {
            const el = document.getElementById('status-message');
            if (!el) return;
            el.style.color = type === 'error' ? '#c0392b' : '#0a0';
            el.innerText = text;
            clearTimeout(window.statusMessageTimeout);
            window.statusMessageTimeout = setTimeout(() => { el.innerText = ''; }, 4000);
        }

        function aggiornaFinanze() {
            const incassoTotale = vendite.reduce((sum, v) => sum + v.totale, 0);
            document.getElementById('incasso-totale').innerText = `€ ${incassoTotale.toFixed(2)}`;

            const venditePerData = {};
            vendite.forEach(v => {
                venditePerData[v.data] = (venditePerData[v.data] || 0) + v.totale;
            });

            const etichetteDate = Object.keys(venditePerData);
            const datiIncasso = Object.values(venditePerData);

            if(etichetteDate.length === 0) {
                etichetteDate.push("Oggi");
                datiIncasso.push(0);
            }

            const ctx = document.getElementById('graficoVendite').getContext('2d');
            if (chartInstance) chartInstance.destroy(); 
            const maxIncasso = Math.max(...datiIncasso, 10);

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: etichetteDate,
                    datasets: [{
                        label: 'Incasso Giornaliero (€)',
                        data: datiIncasso,
                        backgroundColor: '#27ae60',
                        borderColor: '#2ecc71',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            suggestedMax: maxIncasso * 1.2,
                            ticks: { precision: 0 }
                        }
                    }
                }
            });
        }

        caricaDati();
    </script>
</body>
</html>
